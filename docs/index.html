                </div>
                <div class="chart-card chart-pie-card">
                    <div class="chart-header">
                        <h2>來源分佈</h2>
                    </div>
                    <div class="chart-container chart-pie-container">
                        <canvas id="source-pie-chart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 篩選與文章列表 -->
        <section class="articles-section" id="articles-section">
            <div class="section-header">
                <h2>📰 最新文章</h2>
                <div class="filters" id="filters">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="🔍 搜尋文章標題或內容..." onkeyup="if(event.key === 'Enter') loadArticles()">
                        <button onclick="loadArticles()" class="search-btn">搜尋</button>
                    </div>
                    <select id="filter-sentiment" onchange="loadArticles()">
                        <option value="all">所有情感</option>
                        <option value="positive">😊 正面</option>
                        <option value="negative">😟 負面</option>
                        <option value="neutral">😐 中立</option>
                    </select>
                    <select id="filter-source" onchange="loadArticles()">
                        <option value="all">所有來源</option>
                        <option value="Google News">Google News</option>
                        <option value="PTT">PTT</option>
                        <option value="Dcard">Dcard</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Google Reviews">Google 評論</option>
                        <option value="Tavily Search">Tavily Search</option>
                        <option value="DuckDuckGo Search">DuckDuckGo Search</option>
                    </select>
                    <select id="filter-days" onchange="loadArticles()">
                        <option value="1">今日</option>
                        <option value="yesterday">昨日</option>
                        <option value="7" selected>近 7 天</option>
                    </select>
                </div>
            </div>

            <div class="articles-list" id="articles-list">
                <div class="loading-placeholder">
                    <div class="spinner"></div>
                    <p>載入中...</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </section>

        <!-- 執行記錄 -->
        <section class="logs-section" id="logs-section">
            <div class="section-header">
                <h2>📋 執行記錄</h2>
                <button class="btn btn-secondary" onclick="loadLogs()">重新整理</button>
            </div>
            <div class="logs-table-wrapper" id="logs-table-wrapper">
                <table class="logs-table" id="logs-table">
                    <thead>
                        <tr>
                            <th>執行時間</th>
                            <th>搜集</th>
                            <th>分析</th>
                            <th>正面</th>
                            <th>負面</th>
                            <th>中立</th>
                            <th>通知</th>
                            <th>狀態</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <tr><td colspan="8" class="empty-state">尚無執行記錄</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 頁尾 -->
    <footer class="footer" id="footer">
        <p>🍔 麥當勞品牌輿情監控系統 &copy; 2026 | Powered by Flask + LLM</p>
    </footer>

    <!-- 載入通知 toast -->
    <div class="toast-container" id="toast-container"></div>

    <script src="static/js/main.js"></script>

    <!-- 詳細報表彈窗 -->
    <div id="detail-modal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">詳細報表</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 動態插入內容 -->
                <div class="loading-placeholder">
                    <div class="spinner"></div>
                    <p>正在生成明細...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
            </div>
        </div>
    </div>
</body>
</html>
