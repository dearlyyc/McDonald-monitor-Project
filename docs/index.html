漲，吸引更多消費者回流。\n\n《華爾街日報》11日率先報導，三名知情人士透露，麥當勞為因應物價漲聲不斷，啟動內部代號「McValue 2.0」策略，預計4月在美推出抗漲優惠，包括香腸比司吉（Sausage Biscuit）、四塊麥克雞塊等品項3美元有找，並同步推出4美元超值早餐組合，內容包含滿福堡、薯餅和一杯咖啡，端出超強促銷吸客。\n\n麥當勞自疫情後面臨原物料成本上升壓力，一度被迫漲價因應，嚇跑不少對價格敏感的消費者。為了挽回消費者青睞，麥當勞陸續展開大降價，八款熱門套餐價格全面下殺八五折，還將推出最低只要5美元的「窮鬼套餐」，出奇招搶客。\n\n麥當勞執行長Chris Kempczinski 2月曾表示，低價策略並非長久之計，但可強化品牌在低價位市場的競爭力，有助於提升客流量。競爭對手如漢堡王也紛紛祭出限時優惠，加劇速食業價格戰。\n\n（圖片來源：麥當勞）\n\n＊編者按：本文僅供參考之用，並不構成要約、招攬或邀請、誘使、任何不論種類或形式之申述或訂立任何建議及推薦，讀者務請運用個人獨立思考能力，自行作出投資決定，如因相關建議招致損失，概與《精實財經媒體》、編者及作者無涉。\n\n延伸閱讀：\n\n瓦城2月營收創歷史新高；美國首店3月啟動試營運", "summary": null, "source": "Tavily Search", "url": "https://today.line.me/tw/v3/article/rmLeR2n", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:58:01.826417", "collected_at": "2026-03-23T19:58:07.257902", "analyzed_at": null, "raw_data": "{\"score\": 0.9974885, \"query\": \"麥當勞 優惠 最新\"}"}, {"id": 2862, "title": "麥當勞「無敵大麥克」與「香鷄大麥克」回歸經典口訣再拿免費 ...", "content": "為大麥克鐵粉誠摯獻上多層次美味，麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回歸。「無敵大麥克」以4層100%純牛肉，搭配因牛肉餅溫度而焦糖化、釋放出天然糖分的洋蔥丁，加上新鮮爽脆的生菜、溫熱融化的吉事片、酸黃瓜及招牌大麥克醬，多達15層的豐富口感，征服肉食控的味蕾；「香鷄大麥克」則延續大麥克家族豐富疊層與份量飽足的特色，以雙層酥炸鷄排搭配，為喜愛鷄肉的顧客提供另一種選擇。\n\n麥當勞亦同步推出「大麥克分享盒」，內含2份「大麥克家族」漢堡（大麥克或香鷄大麥克，任選兩款），再搭配20塊麥克鷄塊與1包大薯，份量澎湃，多元餐點組合滿足消費者的胃口。\n\n1999年動力火車為「麥香堡」（現名稱為大麥克）創造專屬口訣，「雙層純牛肉、獨特醬料加生菜、吉士洋蔥酸黃瓜、芝麻麵包蓋上去」—這個朗朗上口的經典口訣，延續27年，是無數消費者心中的獨家記憶。今年，動力火車更重返麥當勞，與歌手派偉俊共同演唱全新歌曲，演繹經典「大麥克」。此次麥當勞邀請新世代創作才子派偉俊打造全新「大麥克點起來MAC it BEAT」歌曲，將經典大麥克口訣重新編曲，歌詞巧妙結合產品特色與生活場景，融入Gen Z喜愛的音樂元素，讓大麥克成為新世代的文化象徵。\n\n過去曾掀起社群熱潮的麥克瘋擂台賽，以人人都會哼唱的大麥克經典口訣，吸引大批民眾參與、翻唱分享，成為許多人記憶中的歡唱時刻。今年，麥當勞推出全新「大麥克點起來MAC it BEAT」歌曲，並且再度復刻麥克瘋擂台賽活動，自3月14日與3月15日兩日的21:00至22:00，於全台3間限定餐廳推出限時一小時的「大麥克 MAC it BEAT 快閃活動」，邀請消費者一起把熟悉的節奏再次唱響。每組人數上限10人，凡現場演唱「大麥克點起來」，每位參加者皆可獲得大麥克兌換券乙張，每一組更可獲得大麥克手燈乙組(兩入)。 [...] 此外，自3月16日起至3月22日止，將同步推出線上快閃活動，邀請消費者於麥當勞Threads官方帳號的貼文下留言上傳翻唱影片，就有機會抽中「大麥克麥克風」（乙名）或「大麥克手燈」（50 名），讓大麥克的經典魅力在新世代的傳唱中持續延燒。\n\n在「無敵大麥克」及「香鷄大麥克」經典美味回歸的同時，麥當勞響應近期棒球賽事熱潮，自3月4日起至3月31日推出「戰勝套餐」。套餐主餐可選擇大麥克家族（大麥克、無敵大麥克或香鷄大麥克，三款漢堡任選一款），以經典「三層麵包」呼應棒球場上「三層三層戰勝他」的氣勢，配餐搭配麥脆鷄腿（乙塊）及大薯，象徵「一棒入魂，全壘打」的寓意，再加上經典飲品焦糖奶茶（冰），球迷在享用美味的同時，也能感受到「一起挺台灣」的熱血氛圍。\n\n同時，麥當勞APP將隨台灣棒球選手於小組賽期間加碼推出「台灣尚勇！APP應援優惠」，以美味串聯全民熱情。自3月5日起至3月8日，麥當勞APP將美食優惠，與台灣選手們於棒球賽事中的精彩表現連動，依據當日得分與全壘打次數，賽後隔日發放限時優惠券：只要台灣選手每擊出1支全壘打，即可獲得指定主餐現折10元；每得1分，即可獲得指定點心現折5元，全壘打支數與得分愈多，優惠券折扣愈多（兩張優惠券折扣金額皆最高折抵至半價）。\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回...\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回歸，讓大麥克鐵粉重溫那份熟悉的重磅美味。麥當勞／提供 嚴雅芳\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回...\n\n※ 歡迎用「轉貼」或「分享」的方式轉傳文章連結；未經授權，請勿複製轉貼文章內容\n\n### 猜你喜歡\n\nnews photo\n\n### 北富銀攜萬事達卡 祭旅日獨家優惠\n\nnews photo [...] ### 猜你喜歡\n\nnews photo\n\n### 北富銀攜萬事達卡 祭旅日獨家優惠\n\nnews photo\n\n### 7-ELEVEN 賣貨便近700萬賣家愛用！再出三招添買氣\n\nnews photo\n\n### 雲品3月接手維多麗亞酒店宴會及中餐事業 接單已排至明年第2季\n\nnews photo\n\n### 派星堂PALAXY 金牌主廚偕法國奶油推限定新品\n\nnews photo\n\n### 國泰 CUBE 卡友享演唱會尊榮禮遇\n\nnews photo\n\n### 迎戰WBC應援升級 台中府前廣場神秘嘉賓助抗日成功！\n\nnews photo\n\n### 台灣蘭展「賞花＋賞味」雙重體驗 南市府推農會開箱樂\n\nnews photo\n\n### 「澳門銀河」榮譽呈獻： 歐陽「萬」事「成」意賀年Show 一連兩晚大放笑彈　群星拱照喜賀馬年\n\nnews photo\n\n### 「澳門銀河」榮譽呈獻： 歐陽「萬」事「成」意賀年Sho", "summary": null, "source": "Tavily Search", "url": "https://money.udn.com/money/story/122328/9353518", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:56.246613", "collected_at": "2026-03-23T19:58:07.252902", "analyzed_at": null, "raw_data": "{\"score\": 0.987375, \"query\": \"麥當勞 活動 最新\"}"}, {"id": 2855, "title": "麥當勞【2026麥麥共讀月】天生就是大故事家｜兒童節親子 ...", "content": "麥當勞相信每個孩子都擁有無限創造力，只要一句話加上一點想像，天馬行空的故事就開始了！\n\n今年兒童節，麥麥共讀月以「創造力」為核心，在華山文創園區打造出豐富好玩的親子共讀活動，邀請爸爸媽媽帶著孩子一起開啟充滿創造力的共讀歷險👨‍👩‍👧‍👦\n\n📍活動地點：華山1914文化創意產業園區華山劇場  \n⏰活動時間： 2026/04/03（五）— 04/06（一）  \n🎁報名禮品：線上報名「預約限定場」即可獲得麥當勞年度選書《哇\\_\\_\\_快碰到了》乙本與小薯兌換券乙張  \n\\現場同樂場無附贈報名禮品\n\n現場同樂場報名資訊\n\n 活動地點： 華山 1914 文創園區 華山劇場\n 活動對象： 每場次共 10 個小朋友名額（每位至多可由 2位家長陪同）。\n 報名規範：每日上午09:30於活動現場報到處預約，僅限預約當日活動。\n 報到規範：請於場次開始前 10分鐘於活動報名處完成報到。\n 候補機制：入場後 15 分鐘若報名者未進行報到，名額將釋出開放給候補者。\n\n〈麥麥盒奇幻隧道〉一起創造故事\n\n這是一場跳脫書本框架的創造力體驗！每個孩子，都將帶著麥麥盒夥伴一起在隧道裡展開奇幻歷險，沿途發現好玩的事物、蒐集有趣的道具，幫助麥麥盒變身成獨一無二的樣子，還能在〈天生大 \n\n作为首批进入深圳的外资企业，30多年来，麦当劳持续深耕深圳以及大湾区市场，加速门店布局，落地创新消费场景。目前，以深圳为核心，辐射东莞、惠州及粤西地区的麦当劳餐厅总数已突破900家。\n\n凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。 [...] 从生产制造到研发创新，深圳吸引外资结构正持续优化。2025年，深圳全市高技术产业实际使用外资超230亿元，占全市总量四成以上。\n\n目前，深圳拥有外资研发中心超200个，研发人员超3万人。苹果、西门子、星巴克、TÜV莱茵集团、法国达索等跨国企业纷纷在深设立创新中心、研发及制造基地。\n\n“深圳是中国新能源汽车产业发展较早的城市之一，拥有较为完善的新能源汽车产业基础。”法雷奥智能系统事业部中国区高级运营总监贺显军表示，法雷奥深圳工厂经过20年发展，已成为法雷奥集团智能系统最大的生产基地和电子研发中心之一。“我们将持续以深圳工厂为载体，深化在智能驾驶、智能座舱领域的技术迭代与产能优化，夯实在华投资发展根基。”贺显军说。\n\n营商环境持续优化\n\n打造全球最佳投资首选地\n\n“在迪卡侬的全球版图中，深圳早已不只是零售市场，更是全球供应链中不可或缺的重要一环。”2026年是迪卡侬进入深圳20周年，从南山欧洲城首店到全市14家门店，迪卡侬已经从零售商成长为“城市体育生态共建者”。\n\n迪卡侬零售深圳区域总监熊赟丹表示，得益于深圳持续优化的营商环境与开放包容的产业生态， 迪卡侬在深圳实现从智能生产、零售网络到全产业链体系布局。\n\n知名外企、跨国巨头持续布局深圳，不仅是被这座城市开放程度高、经济活力强、创新氛围浓、产业体系完整高效等优势所吸引，不断优化的市场化、法治化、国际化营商环境也是“磁力”所在。\n\n深圳始终坚持“心诚+行程”面向全球招引，出台一系列政策持续扩大开放合作领域，颁布实施《深圳经济特区外商投资条例》，不断完善促进外商投资的服务体系，努力打造“全球最佳投资首选地”，让外资企业进得来、留得住、发展好、发展快。", "summary": null, "source": "Tavily Search", "url": "https://news.qq.com/rain/a/20260224A01LT800", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.238028", "analyzed_at": null, "raw_data": "{\"score\": 0.95565146, \"query\": \"麥當勞 2026\"}"}, {"id": 2848, "title": "外资持续看好深圳布局深圳2025年我市新设外商投资 ... - 鹏城新力", "content": "## 外资持续看好深圳布局深圳 2025年我市新设外商投资企业数量位列全国首位\n\n2026/02/25\n\n深圳新闻网2026年2月24日讯（深圳特区报记者 吴亚男）过去一年，全球有超110个国家和地区来深投资，美国杜邦、法国达索、法国德高、英国BP石油、瑞典海克斯康等知名外资企业纷纷在深新设企业或追加投资，一批高“含金量”“含新量”外资项目竞相落地……一笔笔投资、一个个项目背后，是全球投资者对深圳发展机遇的持续看好。\n\n开放创新的深圳，是世界观察中国的重要窗口，更是全球投资的热土。数据显示，2025年，我市实际使用外资504.8亿元、增长14.4%，规模跃居全国城市第二；新设外资企业约1.6万家、增长63.3%，数量位列全国大中城市首位。\n\n外资引力场持续增强 5年新设外企约4.4万家\n\n2026年1月1日，一座独具特色的“美术馆”亮相深圳湾。这家以未来主义美学为灵感、柔和粉彩为主调的“深圳麦麦美术馆”，是深圳麦当劳将美学理念融入消费场景打造的创新门店，为市民带来“艺术+美食”沉浸式体验。\n\n“作为麦当劳在中国内地首家门店的诞生地，深圳始终承载着品牌创新试验田的核心使命。‘深圳麦麦美术馆’正是我们从用餐空间向体验式消费新地标迈进的重要一步。”麦当劳中国副总裁、深圳市场高级总经理赵崇基表示。\n\n作为首批进入深圳的外资企业，30多年来，麦当劳持续深耕深圳以及大湾区市场，加速门店布局，落地创新消费场景。目前，以深圳为核心，辐射东莞、惠州及粤西地区的麦当劳餐厅总数已突破900家。\n\n凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。 [...] 从生产制造到研发创新，深圳吸引外资结构正持续优化。2025年，深圳全市高技术产业实际使用外资超230亿元，占全市总量四成以上。\n\n目前，深圳拥有外资研发中心超200个，研发人员超3万人。苹果、西门子、星巴克、TÜV莱茵集团、法国达索等跨国企业纷纷在深设立创新中心、研发及制造基地。\n\n“深圳是中国新能源汽车产业发展较早的城市之一，拥有较为完善的新能源汽车产业基础。”法雷奥智能系统事业部中国区高级运营总监贺显军表示，法雷奥深圳工厂经过20年发展，已成为法雷奥集团智能系统最大的生产基地和电子研发中心之一。“我们将持续以深圳工厂为载体，深化在智能驾驶、智能座舱领域的技术迭代与产能优化，夯实在华投资发展根基。”贺显军说。\n\n营商环境持续优化\n\n打造全球最佳投资首选地\n\n“在迪卡侬的全球版图中，深圳早已不只是零售市场，更是全球供应链中不可或缺的重要一环。”2026年是迪卡侬进入深圳20周年，从南山欧洲城首店到全市14家门店，迪卡侬已经从零售商成长为“城市体育生态共建者”。\n\n迪卡侬零售深圳区域总监熊赟丹表示，得益于深圳持续优化的营商环境与开放包容的产业生态， 迪卡侬在深圳实现从智能生产、零售网络到全产业链体系布局。\n\n返回列表 [...] 凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。\n\n数据显示，“十四五”期间，深圳五年新设外商投资企业4.4万家、占全国比重16.2%，实际利用外资超3000亿元、较“十三五”增长18.9%。截至目前，全球共有180个国家和地区来深投资，累计在深投资的世界500强企业超340家，来自发达经济体的外资企业加速云集，深圳作为跨国投资热土的含金量持续提升。\n\n今年1月，深圳举办“2026外企新春交流活动”，吸引西门子、莱茵TÜV、博世等14家全球知名领军企业以及外国商协会代表参与。通过走访产业园区、座谈交流，企业实地感受深圳的产业生态、政策优势与发展机遇。\n\n“此次活动不仅让我们看到了‘深圳速度’，更深刻感受到了‘深圳质量’与‘深圳创新’。”中国欧盟商会华南分会代表表示，深圳优越的营商环境、清晰的产业规划以及务实高效的政策支持，极大地增强了欧盟企业在深圳长期发展的信心。\n\n投资结构向新向优 全球创新要素加速“卡位”\n\n前不久，渣打银行大湾区首家优先私人理财中心落地深圳，成为继汇丰、恒生、东亚后第4家在深圳布局此类财富管理特色机构的外资银行。\n\n近年来，金融业成为深圳吸引外资的重要领域，外资银行通过多种方式，持续加大在深布局力度。开泰银行、招商永隆银行、中信银行国际、华侨银行在深设立金融科技子公司；星展银行先后三次投资增持深圳农商行；大新银行设立全国首家“双牌照”银行；西班牙桑坦德银行获批设立深圳分行……深圳外资银行机构数量和业务规模长期稳居国内城市前三。\n\n外资外企加速布局深圳，用真金白银投下“信任票”。这既源于外资在深圳看到并收获实实在在的发展机遇，也得益于深圳不断完善的先进制造产业链和创新生态链，吸引全球创新要素加速集聚。", "summary": null, "source": "Tavily Search", "url": "http://www.pengchengenergy.com/content/2026-02/25/content_31956104.html", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.236425", "analyzed_at": null, "raw_data": "{\"score\": 0.9658996, \"query\": \"麥當勞 2026\"}"}, {"id": 2847, "title": "麦当劳×马力欧联名来了🤩全套收藏！ | 社区美国生活精选", "content": "$20.00 ~~$40.00~~\n\n 超全汇总！持续更新2026美国演唱会终极指南🔥刘若英/林宥嘉/告五人/BTS/YE/Cardi B\n [2025年10大免费海外电影电视剧网站推荐，播放速度快，无广告！ [实时更新]](/guide/976446)\n 职业排期全面回暖，亲属移民突然提速！2026年4月最新绿卡排期发布｜美国移民绿卡攻略\n 2025美国热门英文名字男生/女生英文名1000个排行！\n 网球党别刷了 ck market and economy is like a man walking his dog）；總體經濟基本面或企業價值就如同狗主人， 股市或公司股價就如同狗，狗有時走在主人的前面，有時走在後面， 不過終究會回到主人的身邊，意味著長期而言股價仍會回歸基本面。 40 金融小語彙 英語俗諺說 「每隻狗都有牠得意的一天」 （every dog has his day） ， 意思是說低潮總會過去，好運一定會來到，人人都有走運的時候。 ~2023.2.23 小編加碼來報報~ 2 月23 日應該是所有汪星人最得意的一天了 ， 狗派 粉絲，記得回家多給愛犬幾片餅乾，向狗寶貝說一聲謝 謝牠們的陪伴喔！ 41 金融小語彙 前英格蘭銀行首席經濟學家Haldane： 「金融管制最好如狗接飛盤」 [...] 國民眾批評。英格蘭銀行（Bank of England, BoE）甚至曾因使用的原 物料含有動物油脂，招致素食者及一些宗教團體的反彈聲浪。 ~2025.9.12 小編加碼來報報~ 其實 ， 本行也曾發行過塑膠鈔券喔！回顧1999 年 6 月15 日，當時為慶祝新台幣發行50 週年，本行曾 發行面額50 元塑膠鈔券！這張紀念性質的塑膠鈔券 雖可在市面上流通 ， 卻幾乎沒有民眾在交易時拿到過 ， 因為大家都會留做紀念，捨不得拿出來使用。這張塑 膠鈔券係本行迄今唯一一次發行過的塑膠鈔券，限量 印製3,000 萬張。 35 通膨相關知識 【金融小語彙】 37 金融小語彙 投資界俗話「死貓反彈」 2 月22 日是日本的「貓之日」 （猫の日）。「貓之日」是在1987 年，由愛貓人士組成的貓之日執行委員會與日本寵物食品協會共同制 定，目的係為了對與貓一起生活的幸福表達感謝之意，並與貓一同慶 祝這份喜悅。另外，日語 「2」 的讀音和形容貓叫聲的擬聲詞 「にゃん」 （nyan）相似，因此將2 月22 日訂為「貓之日」。 說到「貓之日」，不禁聯想到與貓相關的股市用語「死貓反彈」 （dead cat bounce）。「死貓反彈」意指股價或指數在大幅下跌的趨勢 中，短暫出現的小幅反彈。此一語彙來自於投資界的俗話：「如果從 高處掉下來，即使是死貓也會反彈。」（Even a dead cat will bounce if dropped from a height.） 1985 年12 月初，英國《金融時報》首度使用「死貓反彈」乙詞。 報導中指出，一位股市經理人將新加坡、馬來西亞股市急遽下跌又出 38 金融小語彙 現回升的跡象，比喻為「死貓反彈」。在那之後，新加坡、馬來西亞 經濟一直在走下坡，直到幾年後才好轉。 ~2023.2.22 小編加碼來報報~ 其實 ， 國際間有許多慶祝專屬貓咪的節日 ， [...] 謝牠們的陪伴喔！ 41 金融小語彙 前英格蘭銀行首席經濟學家Haldane： 「金融管制最好如狗接飛盤」 小狗雖然沒學過萬有引力等高深的物理學，但不論飼主如何變換 拋出角度，甚至風向改變，小狗最終都能接住飛盤。而聰明的物理學 家，卻未必能每一次都接住飛盤，猶如複雜的金融監管制度無法接住 名為金融危機的飛盤。 前英格蘭銀行（Bank of England, BoE）首席經濟學家Andy Haldane，於2012 年8 月31 日全球央行年會上，以「小狗與飛盤」 （The Dog and The Frisbee）為題發表演說，反思何以小狗可精準接住 飼主丟出的飛盤，經濟學家卻無法接住名為「危機」的飛盤。 小狗能順利接住飛盤的祕訣其實很簡單，或者不要把問題想得太 複雜。小狗接飛盤依循的經驗法則如下：盯住飛盤的視線角度保持大 致不變的情況下，向前奔跑，而人類亦可依循相同規則。 42 金融小語彙 經濟學家", "summary": null, "source": "Tavily Search", "url": "https://www.cbc.gov.tw/public/data/data/%E4%B8%AD%E5%A4%AE%E9%8A%80%E8%A1%8C%E8%87%89%E6%9B%B8%E8%B2%BC%E6%96%87%E7%B3%BB%E5%88%97%E5%B0%88%E6%9B%B8III.pdf", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T17:10:13.970068", "collected_at": "2026-03-23T17:10:27.735440", "analyzed_at": null, "raw_data": "{\"score\": 0.09067929, \"q 當勞為因應物價漲聲不斷，啟動內部代號「McValue 2.0」策略，預計4月在美推出抗漲優惠，包括香腸比司吉（Sausage Biscuit）、四塊麥克雞塊等品項3美元有找，並同步推出4美元超值早餐組合，內容包含滿福堡、薯餅和一杯咖啡，端出超強促銷吸客。\n\n麥當勞自疫情後面臨原物料成本上升壓力，一度被迫漲價因應，嚇跑不少對價格敏感的消費者。為了挽回消費者青睞，麥當勞陸續展開大降價，八款熱門套餐價格全面下殺八五折，還將推出最低只要5美元的「窮鬼套餐」，出奇招搶客。\n\n麥當勞執行長Chris Kempczinski 2月曾表示，低價策略並非長久之計，但可強化品牌在低價位市場的競爭力，有助於提升客流量。競爭對手如漢堡王也紛紛祭出限時優惠，加劇速食業價格戰。\n\n（圖片來源：麥當勞）\n\n＊編者按：本文僅供參考之用，並不構成要約、招攬或邀請、誘使、任何不論種類或形式之申述或訂立任何建議及推薦，讀者務請運用個人獨立思考能力，自行作出投資決定，如因相關建議招致損失，概與《精實財經媒體》、編者及作者無涉。\n\n延伸閱讀：\n\n瓦城2月營收創歷史新高；美國首店3月啟動試營運", "summary": null, "source": "Tavily Search", "url": "https://today.line.me/tw/v3/article/rmLeR2n", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:58:01.826417", "collected_at": "2026-03-23T19:58:07.257902", "analyzed_at": null, "raw_data": "{\"score\": 0.9974885, \"query\": \"麥當勞 優惠 最新\"}"}, {"id": 2862, "title": "麥當勞「無敵大麥克」與「香鷄大麥克」回歸經典口訣再拿免費 ...", "content": "為大麥克鐵粉誠摯獻上多層次美味，麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回歸。「無敵大麥克」以4層100%純牛肉，搭配因牛肉餅溫度而焦糖化、釋放出天然糖分的洋蔥丁，加上新鮮爽脆的生菜、溫熱融化的吉事片、酸黃瓜及招牌大麥克醬，多達15層的豐富口感，征服肉食控的味蕾；「香鷄大麥克」則延續大麥克家族豐富疊層與份量飽足的特色，以雙層酥炸鷄排搭配，為喜愛鷄肉的顧客提供另一種選擇。\n\n麥當勞亦同步推出「大麥克分享盒」，內含2份「大麥克家族」漢堡（大麥克或香鷄大麥克，任選兩款），再搭配20塊麥克鷄塊與1包大薯，份量澎湃，多元餐點組合滿足消費者的胃口。\n\n1999年動力火車為「麥香堡」（現名稱為大麥克）創造專屬口訣，「雙層純牛肉、獨特醬料加生菜、吉士洋蔥酸黃瓜、芝麻麵包蓋上去」—這個朗朗上口的經典口訣，延續27年，是無數消費者心中的獨家記憶。今年，動力火車更重返麥當勞，與歌手派偉俊共同演唱全新歌曲，演繹經典「大麥克」。此次麥當勞邀請新世代創作才子派偉俊打造全新「大麥克點起來MAC it BEAT」歌曲，將經典大麥克口訣重新編曲，歌詞巧妙結合產品特色與生活場景，融入Gen Z喜愛的音樂元素，讓大麥克成為新世代的文化象徵。\n\n過去曾掀起社群熱潮的麥克瘋擂台賽，以人人都會哼唱的大麥克經典口訣，吸引大批民眾參與、翻唱分享，成為許多人記憶中的歡唱時刻。今年，麥當勞推出全新「大麥克點起來MAC it BEAT」歌曲，並且再度復刻麥克瘋擂台賽活動，自3月14日與3月15日兩日的21:00至22:00，於全台3間限定餐廳推出限時一小時的「大麥克 MAC it BEAT 快閃活動」，邀請消費者一起把熟悉的節奏再次唱響。每組人數上限10人，凡現場演唱「大麥克點起來」，每位參加者皆可獲得大麥克兌換券乙張，每一組更可獲得大麥克手燈乙組(兩入)。 [...] 此外，自3月16日起至3月22日止，將同步推出線上快閃活動，邀請消費者於麥當勞Threads官方帳號的貼文下留言上傳翻唱影片，就有機會抽中「大麥克麥克風」（乙名）或「大麥克手燈」（50 名），讓大麥克的經典魅力在新世代的傳唱中持續延燒。\n\n在「無敵大麥克」及「香鷄大麥克」經典美味回歸的同時，麥當勞響應近期棒球賽事熱潮，自3月4日起至3月31日推出「戰勝套餐」。套餐主餐可選擇大麥克家族（大麥克、無敵大麥克或香鷄大麥克，三款漢堡任選一款），以經典「三層麵包」呼應棒球場上「三層三層戰勝他」的氣勢，配餐搭配麥脆鷄腿（乙塊）及大薯，象徵「一棒入魂，全壘打」的寓意，再加上經典飲品焦糖奶茶（冰），球迷在享用美味的同時，也能感受到「一起挺台灣」的熱血氛圍。\n\n同時，麥當勞APP將隨台灣棒球選手於小組賽期間加碼推出「台灣尚勇！APP應援優惠」，以美味串聯全民熱情。自3月5日起至3月8日，麥當勞APP將美食優惠，與台灣選手們於棒球賽事中的精彩表現連動，依據當日得分與全壘打次數，賽後隔日發放限時優惠券：只要台灣選手每擊出1支全壘打，即可獲得指定主餐現折10元；每得1分，即可獲得指定點心現折5元，全壘打支數與得分愈多，優惠券折扣愈多（兩張優惠券折扣金額皆最高折抵至半價）。\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回...\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回歸，讓大麥克鐵粉重溫那份熟悉的重磅美味。麥當勞／提供 嚴雅芳\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回...\n\n※ 歡迎用「轉貼」或「分享」的方式轉傳文章連結；未經授權，請勿複製轉貼文章內容\n\n### 猜你喜歡\n\nnews photo\n\n### 北富銀攜萬事達卡 祭旅日獨家優惠\n\nnews photo [...] ### 猜你喜歡\n\nnews photo\n\n### 北富銀攜萬事達卡 祭旅日獨家優惠\n\nnews photo\n\n### 7-ELEVEN 賣貨便近700萬賣家愛用！再出三招添買氣\n\nnews photo\n\n### 雲品3月接手維多麗亞酒店宴會及中餐事業 接單已排至明年第2季\n\nnews photo\n\n### 派星堂PALAXY 金牌主廚偕法國奶油推限定新品\n\nnews photo\n\n### 國泰 CUBE 卡友享演唱會尊榮禮遇\n\nnews photo\n\n### 迎戰WBC應援升級 台中府前廣場神秘嘉賓助抗日成功！\n\nnews photo\n\n### 台灣蘭展「賞花＋賞味」雙重體驗 南市府推農會開箱樂\n\nnews photo\n\n### 「澳門銀河」榮譽呈獻： 歐陽「萬」事「成」意賀年Show 一連兩晚大放笑彈　群星拱照喜賀馬年\n\nnews photo\n\n### 「澳門銀河」榮譽呈獻： 歐陽「萬」事「成」意賀年Sho", "summary": null, "source": "Tavily Search", "url": "https://money.udn.com/money/story/122328/9353518", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:56.246613", "collected_at": "2026-03-23T19:58:07.252902", "analyzed_at": null, "raw_data": "{\"score\": 0.987375, \"query\": \"麥當勞 活動 最新\"}"}, {"id": 2855, "title": "麥當勞【2026麥麥共讀月】天生就是大故事家｜兒童節親子 ...", "content": "麥當勞相信每個孩子都擁有無限創造力，只要一句話加上一點想像，天馬行空的故事就開始了！\n\n今年兒童節，麥麥共讀月以「創造力」為核心，在華山文創園區打造出豐富好玩的親子共讀活動，邀請爸爸媽媽帶著孩子一起開啟充滿創造力的共讀歷險👨‍👩‍👧‍👦\n\n📍活動地點：華山1914文化創意產業園區華山劇場  \n⏰活動時間： 2026/04/03（五）— 04/06（一）  \n🎁報名禮品：線上報名「預約限定場」即可獲得麥當勞年度選書《哇\\_\\_\\_快碰到了》乙本與小薯兌換券乙張  \n\\現場同樂場無附贈報名禮品\n\n現場同樂場報名資訊\n\n 活動地點： 華山 1914 文創園區 華山劇場\n 活動對象： 每場次共 10 個小朋友名額（每位至多可由 2位家長陪同）。\n 報名規範：每日上午09:30於活動現場報到處預約，僅限預約當日活動。\n 報到規範：請於場次開始前 10分鐘於活動報名處完成報到。\n 候補機制：入場後 15 分鐘若報名者未進行報到，名額將釋出開放給候補者。\n\n〈麥麥盒奇幻隧道〉一起創造故事\n\n這是一場跳脫書本框架的創造力體驗！每個孩子，都將帶著麥麥盒夥伴一起在隧道裡展開奇幻歷險，沿途發現好玩的事物、蒐集有趣的道具，幫助麥麥盒變身成獨一無二的樣子，還能在〈天生大故事家錄音間〉錄下自己的創作故事，留下親子間的美好回憶。  \n\\預約限定場才有 。\n\n北市一間麥當勞一名17歲女員工指控遭李姓主管性騷擾、性侵後輕生，士林地檢署處分不起訴（圖／翻攝google map）\n\n少女家屬聲明如下：\n\n一、家屬始終未放棄替被害幼女爭取司法正義，對於檢方再次不起訴處分表達萬分遺憾與哀痛，將於收到不起訴處分書後，與律師團隊研擬意見，依法定程序聲請救濟處理。\n\n二、本案被害人已不幸往生，然相關職場性暴力問題以及友善性別工作環境之建立，仍須各界重視。未成年人遭受權勢性暴力的案件仍層出不窮，為使未成年兒少遭逢不法侵害時，有相關知能與資訊獲取管道得以自我保護，本會仍將持續在個案中全力協助，在通案中努力倡議制度改善。\n\n三、本案發生數年，受到社會各界廣泛關注，家屬深度悲傷並思念愛女，堅持為被害人爭取真相與公道，並希望此類事件中，年輕人為工作賺錢勉力維生，而有可能遭受職場權勢性暴力、霸凌事件等情況，能夠受到普遍重視與監督改善。尤其大型連鎖企業應全面檢視並公開內部的性騷擾處理流程及防治教育訓練內容，確保對員工的保護落實到位。 [...] ，如今卻意外身亡，初步相驗，認定他頭部的鈍器傷是致命傷，警方也在三小時內，就在台南的醫院，逮到去就醫的黃姓男子，檢方訊後也將黃姓嫌犯依殺人罪向法院聲請羈押獲准。原文出處：債務糾紛破局！嘉義20歲軍人陪友談判　對方持刀「朝頭猛砍」傷重不治 [...] 更多民視新聞報導法院認證？酸盧秀燕遇「這事」顯露無能被辦　判決「非謠言」不罰莊瑞雄東港服務處「門鎖遭破壞」！男子潛入翻箱倒櫃　下場曝光了台北市40年名店「鯊魚麵」遭衝撞！2人燙傷送醫", "summary": null, "source": "Tavily Search", "url": "https://tw.news.yahoo.com/%E9%BA%A5%E7%95%B6%E5%8B%9E%E5%A5%B3%E5%93%A1%E5%B7%A5%E6%8E%A7%E9%81%AD%E4%B8%BB%E7%AE%A1%E6%80%A7%E4%BE%B5%E8%BC%95%E7%94%9F-%E6%AA%A22%E5%BA%A6%E4%B8%8D%E8%B5%B7%E8%A8%B4-%E5%AE%B6%E5%B1%AC%E7%99%BC%E8%81%B2-%E9%81%BA%E6%86%BE%E8%88%87%E5%93%80%E7%97%9B-%E5%B0%87%E6%8F%90%E5%86%8D%E8%AD%B0-034600715.html", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:48.965434", "collected_at": "2026-03-23T19:58:07.240034", "analyzed_at": null, "raw_data": "{\"score\": 0.9962346, \"query\": \"麥當勞 最新\"}"}, {"id": 2849, "title": "2025年深圳市新设外商投资企业数量位列全国首位| 聚焦高 ...", "content": "# 外资持续看好深圳布局深圳，2025年深圳市新设外商投资企业数量位列全国首位 | 聚焦高质量发展\n\n头像\n\n深圳特区报\n\n2026-02-24 08:03发布于安徽深圳特区报官方账号\n\n过去一年，全球有超110个国家和地区来深投资，美国杜邦、法国达索、法国德高、英国BP石油、瑞典海克斯康等知名外资企业纷纷在深新设企业或追加投资，一批高“含金量”“含新量”外资项目竞相落地……一笔笔投资、一个个项目背后，是全球投资者对深圳发展机遇的持续看好。\n\n开放创新的深圳，是世界观察中国的重要窗口，更是全球投资的热土。数据显示，2025年，我市实际使用外资504.8亿元、增长14.4%，规模跃居全国城市第二；新设外资企业约1.6万家、增长63.3%，数量位列全国大中城市首位。\n\n外资引力场持续增强 5年新设外企约4.4万家\n\n2026年1月1日，一座独具特色的“美术馆”亮相深圳湾。这家以未来主义美学为灵感、柔和粉彩为主调的“深圳麦麦美术馆”，是深圳麦当劳将美学理念融入消费场景打造的创新门店，为市民带来“艺术+美食”沉浸式体验。\n\n“作为麦当劳在中国内地首家门店的诞生地，深圳始终承载着品牌创新试验田的核心使命。‘深圳麦麦美术馆’正是我们从用餐空间向体验式消费新地标迈进的重要一步。”麦当劳中国副总裁、深圳市场高级总经理赵崇基表示。\n\n作为首批进入深圳的外资企业，30多年来，麦当劳持续深耕深圳以及大湾区市场，加速门店布局，落地创新消费场景。目前，以深圳为核心，辐射东莞、惠州及粤西地区的麦当劳餐厅总数已突破900家。\n\n凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。 [...] 从生产制造到研发创新，深圳吸引外资结构正持续优化。2025年，深圳全市高技术产业实际使用外资超230亿元，占全市总量四成以上。\n\n目前，深圳拥有外资研发中心超200个，研发人员超3万人。苹果、西门子、星巴克、TÜV莱茵集团、法国达索等跨国企业纷纷在深设立创新中心、研发及制造基地。\n\n“深圳是中国新能源汽车产业发展较早的城市之一，拥有较为完善的新能源汽车产业基础。”法雷奥智能系统事业部中国区高级运营总监贺显军表示，法雷奥深圳工厂经过20年发展，已成为法雷奥集团智能系统最大的生产基地和电子研发中心之一。“我们将持续以深圳工厂为载体，深化在智能驾驶、智能座舱领域的技术迭代与产能优化，夯实在华投资发展根基。”贺显军说。\n\n营商环境持续优化\n\n打造全球最佳投资首选地\n\n“在迪卡侬的全球版图中，深圳早已不只是零售市场，更是全球供应链中不可或缺的重要一环。”2026年是迪卡侬进入深圳20周年，从南山欧洲城首店到全市14家门店，迪卡侬已经从零售商成长为“城市体育生态共建者”。\n\n迪卡侬零售深圳区域总监熊赟丹表示，得益于深圳持续优化的营商环境与开放包容的产业生态， 迪卡侬在深圳实现从智能生产、零售网络到全产业链体系布局。\n\n知名外企、跨国巨头持续布局深圳，不仅是被这座城市开放程度高、经济活力强、创新氛围浓、产业体系完整高效等优势所吸引，不断优化的市场化、法治化、国际化营商环境也是“磁力”所在。\n\n深圳始终坚持“心诚+行程”面向全球招引，出台一系列政策持续扩大开放合作领域，颁布实施《深圳经济特区外商投资条例》，不断完善促进外商投资的服务体系，努力打造“全球最佳投资首选地”，让外资企业进得来、留得住、发展好、发展快。", "summary": null, "source": "Tavily Search", "url": "https://news.qq.com/rain/a/20260224A01LT800", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.238028", "analyzed_at": null, "raw_data": "{\"score\": 0.95565146, \"query\": \"麥當勞 2026\"}"}, {"id": 2848, "title": "外资持续看好深圳布局深圳2025年我市新设外商投资 ... - 鹏城新力", "content": "## 外资持续看好深圳布局深圳 2025年我市新设外商投资企业数量位列全国首位\n\n2026/02/25\n\n深圳新闻网2026年2月24日讯（深圳特区报记者 吴亚男）过去一年，全球有超110个国家和地区来深投资，美国杜邦、法国达索、法国德高、英国BP石油、瑞典海克斯康等知名外资企业纷纷在深新设企业或追加投资，一批高“含金量”“含新量”外资项目竞相落地……一笔笔投资、一个个项目背后，是全球投资者对深圳发展机遇的持续看好。\n\n开放创新的深圳，是世界观察中国的重要窗口，更是全球投资的热土。数据显示，2025年，我市实际使用外资504.8亿元、增长14.4%，规模跃居全国城市第二；新设外资企业约1.6万家、增长63.3%，数量位列全国大中城市首位。\n\n外资引力场持续增强 5年新设外企约4.4万家\n\n2026年1月1日，一座独具特色的“美术馆”亮相深圳湾。这家以未来主义美学为灵感、柔和粉彩为主调的“深圳麦麦美术馆”，是深圳麦当劳将美学理念融入消费场景打造的创新门店，为市民带来“艺术+美食”沉浸式体验。\n\n“作为麦当劳在中国内地首家门店的诞生地，深圳始终承载着品牌创新试验田的核心使命。‘深圳麦麦美术馆’正是我们从用餐空间向体验式消费新地标迈进的重要一步。”麦当劳中国副总裁、深圳市场高级总经理赵崇基表示。\n\n作为首批进入深圳的外资企业，30多年来，麦当劳持续深耕深圳以及大湾区市场，加速门店布局，落地创新消费场景。目前，以深圳为核心，辐射东莞、惠州及粤西地区的麦当劳餐厅总数已突破900家。\n\n凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。 [...] 从生产制造到研发创新，深圳吸引外资结构正持续优化。2025年，深圳全市高技术产业实际使用外资超230亿元，占全市总量四成以上。\n\n目前，深圳拥有外资研发中心超200个，研发人员超3万人。苹果、西门子、星巴克、TÜV莱茵集团、法国达索等跨国企业纷纷在深设立创新中心、研发及制造基地。\n\n“深圳是中国新能源汽车产业发展较早的城市之一，拥有较为完善的新能源汽车产业基础。”法雷奥智能系统事业部中国区高级运营总监贺显军表示，法雷奥深圳工厂经过20年发展，已成为法雷奥集团智能系统最大的生产基地和电子研发中心之一。“我们将持续以深圳工厂为载体，深化在智能驾驶、智能座舱领域的技术迭代与产能优化，夯实在华投资发展根基。”贺显军说。\n\n营商环境持续优化\n\n打造全球最佳投资首选地\n\n“在迪卡侬的全球版图中，深圳早已不只是零售市场，更是全球供应链中不可或缺的重要一环。”2026年是迪卡侬进入深圳20周年，从南山欧洲城首店到全市14家门店，迪卡侬已经从零售商成长为“城市体育生态共建者”。\n\n迪卡侬零售深圳区域总监熊赟丹表示，得益于深圳持续优化的营商环境与开放包容的产业生态， 迪卡侬在深圳实现从智能生产、零售网络到全产业链体系布局。\n\n返回列表 [...] 凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。\n\n数据显示，“十四五”期间，深圳五年新设外商投资企业4.4万家、占全国比重16.2%，实际利用外资超3000亿元、较“十三五”增长18.9%。截至目前，全球共有180个国家和地区来深投资，累计在深投资的世界500强企业超340家，来自发达经济体的外资企业加速云集，深圳作为跨国投资热土的含金量持续提升。\n\n今年1月，深圳举办“2026外企新春交流活动”，吸引西门子、莱茵TÜV、博世等14家全球知名领军企业以及外国商协会代表参与。通过走访产业园区、座谈交流，企业实地感受深圳的产业生态、政策优势与发展机遇。\n\n“此次活动不仅让我们看到了‘深圳速度’，更深刻感受到了‘深圳质量’与‘深圳创新’。”中国欧盟商会华南分会代表表示，深圳优越的营商环境、清晰的产业规划以及务实高效的政策支持，极大地增强了欧盟企业在深圳长期发展的信心。\n\n投资结构向新向优 全球创新要素加速“卡位”\n\n前不久，渣打银行大湾区首家优先私人理财中心落地深圳，成为继汇丰、恒生、东亚后第4家在深圳布局此类财富管理特色机构的外资银行。\n\n近年来，金融业成为深圳吸引外资的重要领域，外资银行通过多种方式，持续加大在深布局力度。开泰银行、招商永隆银行、中信银行国际、华侨银行在深设立金融科技子公司；星展银行先后三次投资增持深圳农商行；大新银行设立全国首家“双牌照”银行；西班牙桑坦德银行获批设立深圳分行……深圳外资银行机构数量和业务规模长期稳居国内城市前三。\n\n外资外企加速布局深圳，用真金白银投下“信任票”。这既源于外资在深圳看到并收获实实在在的发展机遇，也得益于深圳不断完善的先进制造产业链和创新生态链，吸引全球创新要素加速集聚。", "summary": null, "source": "Tavily Search", "url": "http://www.pengchengenergy.com/content/2026-02/25/content_31956104.html", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.236425", "analyzed_at": null, "raw_data": "{\"score\": 0.9658996, \"query\": \"麥當勞 2026\"}"}, {"id": 2847, "title": "麦当劳×马力欧联名来了🤩全套收藏！ | 社区美国生活精选", "content": "$20.00 ~~$40.00~~\n\n 超全汇总！持续更新2026美国演唱会终极指南🔥刘若英/林宥嘉/告五人/BTS/YE/Cardi B\n [2025年10大免费海外电影电视剧网站推荐，播放速度快，无广告！ [实时更新]](/guide/976446)\n 职业排期全面回暖，亲属移民突然提速！2026年4月最新绿卡排期发布｜美国移民绿卡攻略\n 2025美国热门英文名字男生/女生英文名1000个排行！\n 网球党别刷了⚠️lululemon春季网球装备杀疯了🎾是要逼我天天泡球场吗！\n 是我们懒人有 tral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.235425", "analyzed_at": null, "raw_data": "{\"score\": 0.98582757, \"query\": \"麥當勞 2026\"}"}, {"id": 2845, "title": "麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新", "content": "## 新浪山东 资讯\n\n  \n\n### 确定不再关注此人吗\n\n麦当劳中国宣布正式开启第十二届“派Day”。 即日起至2026年3月15日，麦当劳派Day以“心想派成，吃派就对”为主题，倾听粉丝呼声，在超值吃派传统之外，更以全新“双拼迷你派”形式，让苹果派与香蕉派惊喜返场，实现一次品尝两款人气口味的愿望。派Day期间，顾客可以最低3.14元的价格选购经典香芋派、菠萝派等多款派产品。与此同时，为打造更具仪式感的节日体验，麦当劳在社交媒体上收集了粉丝对派产品的真挚反馈与热爱，并将真实“吃派心声”融入产品包装并覆盖多个城市的户外广告中，通过多种形式共同庆祝这一与粉丝双向奔赴的年度品牌节日。\n\n  ) \n\n麦当劳派Day首次上新苹果香蕉双拼迷你派，一盒享用两款经典口味\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱\n\n派是麦当劳口味最丰富的产品之一。每年的3月14日是世界圆周率日，因“派”与“π”谐音，麦当劳中国便将每年3月14日设为“派Day”，邀请粉丝一起来吃派庆祝。自2015年起，派Day已逐渐发展为粉丝心中独具仪式感的品牌节日，在社交媒体上，分享麦当劳派的口味、交流吃派体验已成为粉丝们的日常。以人气产品苹果派为例，自2024年8月限时售卖后至今，顾客在社交媒体持续分享近万条呼唤其再次回归的相关内容。今年派Day，麦当劳以“心想派成，吃派就对”为主题，不仅让呼声最高的苹果派与香蕉派同期回归，更以双拼迷你派的创新形式联袂亮相，一款产品即可享用两款人气美味。\n\n粉丝心声印上派盒，户外广告“喊话”回归\n\n为回应粉丝长久以来对麦当劳派产品的支持与热爱，品牌精选粉丝在社交平台分享的真实内容——有对怀念口味的深情呼唤，也有关于派的不同吃法与口味阵营的有趣讨论——并将这些心声融入全新包装设计。一份份真实的喜爱，由此被印在派盒之上，成为可以触碰的“粉丝时刻”。 [...] 这份热爱也延续至线下。活动期间，上海地铁2号线静安寺站站台被派Day主题装点一新——粉丝在社交媒体上发布的文案跃上广告灯箱，让那些真挚的期待被更多人看见。品牌亦借此回应：“心心念念的派回来了，来麦当劳一起庆祝。”与此同时，全国超过50座城市同步上线指路形式的户外广告，迎接广大粉丝前往就近的麦当劳餐厅，品尝记忆中的味道，与热爱再度相逢。\n\n  ) \n\n上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day\n\n2026年3月9日至3月15日，顾客可通过到店取餐及麦乐送购买指定派产品。经典产品香芋派与菠萝派以3.14元的“派Day记忆价”超值回归，全新“苹果香蕉双拼迷你派”则以5.92元的超值价格加入节日促销阵容——3.14与5.92，巧妙呼应了国际圆周率日的3.141592……数字巧思。全新的苹果迷你派采用法式千层酥皮，内馅融入清新苹果粒与淡淡肉桂香气；香蕉迷你派呈现香蕉浓郁醇厚的香甜风味。通过双拼迷你派的创新形式，一次品尝两款回归的人气口味，开启一场诚意满满的吃派狂欢。\n\n分享文章到:   \"分享到微博\")\n\n;)\n\n## 相关新闻\n\n## 推荐阅读\n\n加载中...", "summary": null, "source": "Tavily Search", "url": "https://sd.sina.cn/news/2026-03-09/detail-inhqkhim6881244.d.html?oid=3813698848643489&vt=4", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.232869", "analyzed_at": null, "raw_data": "{\"score\ ing his dog）；總體經濟基本面或企業價值就如同狗主人， 股市或公司股價就如同狗，狗有時走在主人的前面，有時走在後面， 不過終究會回到主人的身邊，意味著長期而言股價仍會回歸基本面。 40 金融小語彙 英語俗諺說 「每隻狗都有牠得意的一天」 （every dog has his day） ， 意思是說低潮總會過去，好運一定會來到，人人都有走運的時候。 ~2023.2.23 小編加碼來報報~ 2 月23 日應該是所有汪星人最得意的一天了 ， 狗派 粉絲，記得回家多給愛犬幾片餅乾，向狗寶貝說一聲謝 謝牠們的陪伴喔！ 41 金融小語彙 前英格蘭銀行首席經濟學家Haldane： 「金融管制最好如狗接飛盤」 [...] 國民眾批評。英格蘭銀行（Bank of England, BoE）甚至曾因使用的原 物料含有動物油脂，招致素食者及一些宗教團體的反彈聲浪。 ~2025.9.12 小編加碼來報報~ 其實 ， 本行也曾發行過塑膠鈔券喔！回顧1999 年 6 月15 日，當時為慶祝新台幣發行50 週年，本行曾 發行面額50 元塑膠鈔券！這張紀念性質的塑膠鈔券 雖可在市面上流通 ， 卻幾乎沒有民眾在交易時拿到過 ， 因為大家都會留做紀念，捨不得拿出來使用。這張塑 膠鈔券係本行迄今唯一一次發行過的塑膠鈔券，限量 印製3,000 萬張。 35 通膨相關知識 【金融小語彙】 37 金融小語彙 投資界俗話「死貓反彈」 2 月22 日是日本的「貓之日」 （猫の日）。「貓之日」是在1987 年，由愛貓人士組成的貓之日執行委員會與日本寵物食品協會共同制 定，目的係為了對與貓一起生活的幸福表達感謝之意，並與貓一同慶 祝這份喜悅。另外，日語 「2」 的讀音和形容貓叫聲的擬聲詞 「にゃん」 （nyan）相似，因此將2 月22 日訂為「貓之日」。 說到「貓之日」，不禁聯想到與貓相關的股市用語「死貓反彈」 （dead cat bounce）。「死貓反彈」意指股價或指數在大幅下跌的趨勢 中，短暫出現的小幅反彈。此一語彙來自於投資界的俗話：「如果從 高處掉下來，即使是死貓也會反彈。」（Even a dead cat will bounce if dropped from a height.） 1985 年12 月初，英國《金融時報》首度使用「死貓反彈」乙詞。 報導中指出，一位股市經理人將新加坡、馬來西亞股市急遽下跌又出 38 金融小語彙 現回升的跡象，比喻為「死貓反彈」。在那之後，新加坡、馬來西亞 經濟一直在走下坡，直到幾年後才好轉。 ~2023.2.22 小編加碼來報報~ 其實 ， 國際間有許多慶祝專屬貓咪的節日 ， [...] 謝牠們的陪伴喔！ 41 金融小語彙 前英格蘭銀行首席經濟學家Haldane： 「金融管制最好如狗接飛盤」 小狗雖然沒學過萬有引力等高深的物理學，但不論飼主如何變換 拋出角度，甚至風向改變，小狗最終都能接住飛盤。而聰明的物理學 家，卻未必能每一次都接住飛盤，猶如複雜的金融監管制度無法接住 名為金融危機的飛盤。 前英格蘭銀行（Bank of England, BoE）首席經濟學家Andy Haldane，於2012 年8 月31 日全球央行年會上，以「小狗與飛盤」 （The Dog and The Frisbee）為題發表演說，反思何以小狗可精準接住 飼主丟出的飛盤，經濟學家卻無法接住名為「危機」的飛盤。 小狗能順利接住飛盤的祕訣其實很簡單，或者不要把問題想得太 複雜。小狗接飛盤依循的經驗法則如下：盯住飛盤的視線角度保持大 致不變的情況下，向前奔跑，而人類亦可依循相同規則。 42 金融小語彙 經濟學家", "summary": null, "source": "Tavily Search", "url": "https://www.cbc.gov.tw/public/data/data/%E4%B8%AD%E5%A4%AE%E9%8A%80%E8%A1%8C%E8%87%89%E6%9B%B8%E8%B2%BC%E6%96%87%E7%B3%BB%E5%88%97%E5%B0%88%E6%9B%B8III.pdf", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T17:10:13.970068", "collected_at": "2026-03-23T17:10:27.735440", "analyzed_at": null, "raw_data": "{\"score\": 0.09067929, \"query\": \"麥當勞 活動 最新\"}"}, {"id": 2574, " 美推出抗漲優惠，包括香腸比司吉（Sausage Biscuit）、四塊麥克雞塊等品項3美元有找，並同步推出4美元超值早餐組合，內容包含滿福堡、薯餅和一杯咖啡，端出超強促銷吸客。\n\n麥當勞自疫情後面臨原物料成本上升壓力，一度被迫漲價因應，嚇跑不少對價格敏感的消費者。為了挽回消費者青睞，麥當勞陸續展開大降價，八款熱門套餐價格全面下殺八五折，還將推出最低只要5美元的「窮鬼套餐」，出奇招搶客。\n\n麥當勞執行長Chris Kempczinski 2月曾表示，低價策略並非長久之計，但可強化品牌在低價位市場的競爭力，有助於提升客流量。競爭對手如漢堡王也紛紛祭出限時優惠，加劇速食業價格戰。\n\n（圖片來源：麥當勞）\n\n＊編者按：本文僅供參考之用，並不構成要約、招攬或邀請、誘使、任何不論種類或形式之申述或訂立任何建議及推薦，讀者務請運用個人獨立思考能力，自行作出投資決定，如因相關建議招致損失，概與《精實財經媒體》、編者及作者無涉。\n\n延伸閱讀：\n\n瓦城2月營收創歷史新高；美國首店3月啟動試營運", "summary": null, "source": "Tavily Search", "url": "https://today.line.me/tw/v3/article/rmLeR2n", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:58:01.826417", "collected_at": "2026-03-23T19:58:07.257902", "analyzed_at": null, "raw_data": "{\"score\": 0.9974885, \"query\": \"麥當勞 優惠 最新\"}"}, {"id": 2862, "title": "麥當勞「無敵大麥克」與「香鷄大麥克」回歸經典口訣再拿免費 ...", "content": "為大麥克鐵粉誠摯獻上多層次美味，麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回歸。「無敵大麥克」以4層100%純牛肉，搭配因牛肉餅溫度而焦糖化、釋放出天然糖分的洋蔥丁，加上新鮮爽脆的生菜、溫熱融化的吉事片、酸黃瓜及招牌大麥克醬，多達15層的豐富口感，征服肉食控的味蕾；「香鷄大麥克」則延續大麥克家族豐富疊層與份量飽足的特色，以雙層酥炸鷄排搭配，為喜愛鷄肉的顧客提供另一種選擇。\n\n麥當勞亦同步推出「大麥克分享盒」，內含2份「大麥克家族」漢堡（大麥克或香鷄大麥克，任選兩款），再搭配20塊麥克鷄塊與1包大薯，份量澎湃，多元餐點組合滿足消費者的胃口。\n\n1999年動力火車為「麥香堡」（現名稱為大麥克）創造專屬口訣，「雙層純牛肉、獨特醬料加生菜、吉士洋蔥酸黃瓜、芝麻麵包蓋上去」—這個朗朗上口的經典口訣，延續27年，是無數消費者心中的獨家記憶。今年，動力火車更重返麥當勞，與歌手派偉俊共同演唱全新歌曲，演繹經典「大麥克」。此次麥當勞邀請新世代創作才子派偉俊打造全新「大麥克點起來MAC it BEAT」歌曲，將經典大麥克口訣重新編曲，歌詞巧妙結合產品特色與生活場景，融入Gen Z喜愛的音樂元素，讓大麥克成為新世代的文化象徵。\n\n過去曾掀起社群熱潮的麥克瘋擂台賽，以人人都會哼唱的大麥克經典口訣，吸引大批民眾參與、翻唱分享，成為許多人記憶中的歡唱時刻。今年，麥當勞推出全新「大麥克點起來MAC it BEAT」歌曲，並且再度復刻麥克瘋擂台賽活動，自3月14日與3月15日兩日的21:00至22:00，於全台3間限定餐廳推出限時一小時的「大麥克 MAC it BEAT 快閃活動」，邀請消費者一起把熟悉的節奏再次唱響。每組人數上限10人，凡現場演唱「大麥克點起來」，每位參加者皆可獲得大麥克兌換券乙張，每一組更可獲得大麥克手燈乙組(兩入)。 [...] 此外，自3月16日起至3月22日止，將同步推出線上快閃活動，邀請消費者於麥當勞Threads官方帳號的貼文下留言上傳翻唱影片，就有機會抽中「大麥克麥克風」（乙名）或「大麥克手燈」（50 名），讓大麥克的經典魅力在新世代的傳唱中持續延燒。\n\n在「無敵大麥克」及「香鷄大麥克」經典美味回歸的同時，麥當勞響應近期棒球賽事熱潮，自3月4日起至3月31日推出「戰勝套餐」。套餐主餐可選擇大麥克家族（大麥克、無敵大麥克或香鷄大麥克，三款漢堡任選一款），以經典「三層麵包」呼應棒球場上「三層三層戰勝他」的氣勢，配餐搭配麥脆鷄腿（乙塊）及大薯，象徵「一棒入魂，全壘打」的寓意，再加上經典飲品焦糖奶茶（冰），球迷在享用美味的同時，也能感受到「一起挺台灣」的熱血氛圍。\n\n同時，麥當勞APP將隨台灣棒球選手於小組賽期間加碼推出「台灣尚勇！APP應援優惠」，以美味串聯全民熱情。自3月5日起至3月8日，麥當勞APP將美食優惠，與台灣選手們於棒球賽事中的精彩表現連動，依據當日得分與全壘打次數，賽後隔日發放限時優惠券：只要台灣選手每擊出1支全壘打，即可獲得指定主餐現折10元；每得1分，即可獲得指定點心現折5元，全壘打支數與得分愈多，優惠券折扣愈多（兩張優惠券折扣金額皆最高折抵至半價）。\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回...\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回歸，讓大麥克鐵粉重溫那份熟悉的重磅美味。麥當勞／提供 嚴雅芳\n\n麥當勞「無敵大麥克」及「香鷄大麥克」自3月4日起至3月31日（或售完為止）限期回...\n\n※ 歡迎用「轉貼」或「分享」的方式轉傳文章連結；未經授權，請勿複製轉貼文章內容\n\n### 猜你喜歡\n\nnews photo\n\n### 北富銀攜萬事達卡 祭旅日獨家優惠\n\nnews photo [...] ### 猜你喜歡\n\nnews photo\n\n### 北富銀攜萬事達卡 祭旅日獨家優惠\n\nnews photo\n\n### 7-ELEVEN 賣貨便近700萬賣家愛用！再出三招添買氣\n\nnews photo\n\n### 雲品3月接手維多麗亞酒店宴會及中餐事業 接單已排至明年第2季\n\nnews photo\n\n### 派星堂PALAXY 金牌主廚偕法國奶油推限定新品\n\nnews photo\n\n### 國泰 CUBE 卡友享演唱會尊榮禮遇\n\nnews photo\n\n### 迎戰WBC應援升級 台中府前廣場神秘嘉賓助抗日成功！\n\nnews photo\n\n### 台灣蘭展「賞花＋賞味」雙重體驗 南市府推農會開箱樂\n\nnews photo\n\n### 「澳門銀河」榮譽呈獻： 歐陽「萬」事「成」意賀年Show 一連兩晚大放笑彈　群星拱照喜賀馬年\n\nnews photo\n\n### 「澳門銀河」榮譽呈獻： 歐陽「萬」事「成」意賀年Sho", "summary": null, "source": "Tavily Search", "url": "https://money.udn.com/money/story/122328/9353518", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:56.246613", "collected_at": "2026-03-23T19:58:07.252902", "analyzed_at": null, "raw_data": "{\"score\": 0.987375, \"query\": \"麥當勞 活動 最新\"}"}, {"id": 2855, "title": "麥當勞【2026麥麥共讀月】天生就是大故事家｜兒童節親子 ...", "content": "麥當勞相信每個孩子都擁有無限創造力，只要一句話加上一點想像，天馬行空的故事就開始了！\n\n今年兒童節，麥麥共讀月以「創造力」為核心，在華山文創園區打造出豐富好玩的親子共讀活動，邀請爸爸媽媽帶著孩子一起開啟充滿創造力的共讀歷險👨‍👩‍👧‍👦\n\n📍活動地點：華山1914文化創意產業園區華山劇場  \n⏰活動時間： 2026/04/03（五）— 04/06（一）  \n🎁報名禮品：線上報名「預約限定場」即可獲得麥當勞年度選書《哇\\_\\_\\_快碰到了》乙本與小薯兌換券乙張  \n\\現場同樂場無附贈報名禮品\n\n現場同樂場報名資訊\n\n 活動地點： 華山 1914 文創園區 華山劇場\n 活動對象： 每場次共 10 個小朋友名額（每位至多可由 2位家長陪同）。\n 報名規範：每日上午09:30於活動現場報到處預約，僅限預約當日活動。\n 報到規範：請於場次開始前 10分鐘於活動報名處完成報到。\n 候補機制：入場後 15 分鐘若報名者未進行報到，名額將釋出開放給候補者。\n\n〈麥麥盒奇幻隧道〉一起創造故事\n\n這是一場跳脫書本框架的創造力體驗！每個孩子，都將帶著麥麥盒夥伴一起在隧道裡展開奇幻歷險，沿途發現好玩的事物、蒐集有趣的道具，幫助麥麥盒變身成獨一無二的樣子，還能在〈天生大故事家錄音間〉錄下自己的創作故事，留下親子間的美好回憶。  \n\\預約限定場才有錄音間的體驗喔！\n\n〈麥麥盒共讀書屋〉一起共讀趣\n\n巨大麥麥盒書屋展示 地檢署處分不起訴（圖／翻攝google map）\n\n少女家屬聲明如下：\n\n一、家屬始終未放棄替被害幼女爭取司法正義，對於檢方再次不起訴處分表達萬分遺憾與哀痛，將於收到不起訴處分書後，與律師團隊研擬意見，依法定程序聲請救濟處理。\n\n二、本案被害人已不幸往生，然相關職場性暴力問題以及友善性別工作環境之建立，仍須各界重視。未成年人遭受權勢性暴力的案件仍層出不窮，為使未成年兒少遭逢不法侵害時，有相關知能與資訊獲取管道得以自我保護，本會仍將持續在個案中全力協助，在通案中努力倡議制度改善。\n\n三、本案發生數年，受到社會各界廣泛關注，家屬深度悲傷並思念愛女，堅持為被害人爭取真相與公道，並希望此類事件中，年輕人為工作賺錢勉力維生，而有可能遭受職場權勢性暴力、霸凌事件等情況，能夠受到普遍重視與監督改善。尤其大型連鎖企業應全面檢視並公開內部的性騷擾處理流程及防治教育訓練內容，確保對員工的保護落實到位。 [...] ，如今卻意外身亡，初步相驗，認定他頭部的鈍器傷是致命傷，警方也在三小時內，就在台南的醫院，逮到去就醫的黃姓男子，檢方訊後也將黃姓嫌犯依殺人罪向法院聲請羈押獲准。原文出處：債務糾紛破局！嘉義20歲軍人陪友談判　對方持刀「朝頭猛砍」傷重不治 [...] 更多民視新聞報導法院認證？酸盧秀燕遇「這事」顯露無能被辦　判決「非謠言」不罰莊瑞雄東港服務處「門鎖遭破壞」！男子潛入翻箱倒櫃　下場曝光了台北市40年名店「鯊魚麵」遭衝撞！2人燙傷送醫", "summary": null, "source": "Tavily Search", "url": "https://tw.news.yahoo.com/%E9%BA%A5%E7%95%B6%E5%8B%9E%E5%A5%B3%E5%93%A1%E5%B7%A5%E6%8E%A7%E9%81%AD%E4%B8%BB%E7%AE%A1%E6%80%A7%E4%BE%B5%E8%BC%95%E7%94%9F-%E6%AA%A22%E5%BA%A6%E4%B8%8D%E8%B5%B7%E8%A8%B4-%E5%AE%B6%E5%B1%AC%E7%99%BC%E8%81%B2-%E9%81%BA%E6%86%BE%E8%88%87%E5%93%80%E7%97%9B-%E5%B0%87%E6%8F%90%E5%86%8D%E8%AD%B0-034600715.html", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:48.965434", "collected_at": "2026-03-23T19:58:07.240034", "analyzed_at": null, "raw_data": "{\"score\": 0.9962346, \"query\": \"麥當勞 最新\"}"}, {"id": 2849, "title": "2025年深圳市新设外商投资企业数量位列全国首位| 聚焦高 ...", "content": "# 外资持续看好深圳布局深圳，2025年深圳市新设外商投资企业数量位列全国首位 | 聚焦高质量发展\n\n头像\n\n深圳特区报\n\n2026-02-24 08:03发布于安徽深圳特区报官方账号\n\n过去一年，全球有超110个国家和地区来深投资，美国杜邦、法国达索、法国德高、英国BP石油、瑞典海克斯康等知名外资企业纷纷在深新设企业或追加投资，一批高“含金量”“含新量”外资项目竞相落地……一笔笔投资、一个个项目背后，是全球投资者对深圳发展机遇的持续看好。\n\n开放创新的深圳，是世界观察中国的重要窗口，更是全球投资的热土。数据显示，2025年，我市实际使用外资504.8亿元、增长14.4%，规模跃居全国城市第二；新设外资企业约1.6万家、增长63.3%，数量位列全国大中城市首位。\n\n外资引力场持续增强 5年新设外企约4.4万家\n\n2026年1月1日，一座独具特色的“美术馆”亮相深圳湾。这家以未来主义美学为灵感、柔和粉彩为主调的“深圳麦麦美术馆”，是深圳麦当劳将美学理念融入消费场景打造的创新门店，为市民带来“艺术+美食”沉浸式体验。\n\n“作为麦当劳在中国内地首家门店的诞生地，深圳始终承载着品牌创新试验田的核心使命。‘深圳麦麦美术馆’正是我们从用餐空间向体验式消费新地标迈进的重要一步。”麦当劳中国副总裁、深圳市场高级总经理赵崇基表示。\n\n作为首批进入深圳的外资企业，30多年来，麦当劳持续深耕深圳以及大湾区市场，加速门店布局，落地创新消费场景。目前，以深圳为核心，辐射东莞、惠州及粤西地区的麦当劳餐厅总数已突破900家。\n\n凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。 [...] 从生产制造到研发创新，深圳吸引外资结构正持续优化。2025年，深圳全市高技术产业实际使用外资超230亿元，占全市总量四成以上。\n\n目前，深圳拥有外资研发中心超200个，研发人员超3万人。苹果、西门子、星巴克、TÜV莱茵集团、法国达索等跨国企业纷纷在深设立创新中心、研发及制造基地。\n\n“深圳是中国新能源汽车产业发展较早的城市之一，拥有较为完善的新能源汽车产业基础。”法雷奥智能系统事业部中国区高级运营总监贺显军表示，法雷奥深圳工厂经过20年发展，已成为法雷奥集团智能系统最大的生产基地和电子研发中心之一。“我们将持续以深圳工厂为载体，深化在智能驾驶、智能座舱领域的技术迭代与产能优化，夯实在华投资发展根基。”贺显军说。\n\n营商环境持续优化\n\n打造全球最佳投资首选地\n\n“在迪卡侬的全球版图中，深圳早已不只是零售市场，更是全球供应链中不可或缺的重要一环。”2026年是迪卡侬进入深圳20周年，从南山欧洲城首店到全市14家门店，迪卡侬已经从零售商成长为“城市体育生态共建者”。\n\n迪卡侬零售深圳区域总监熊赟丹表示，得益于深圳持续优化的营商环境与开放包容的产业生态， 迪卡侬在深圳实现从智能生产、零售网络到全产业链体系布局。\n\n知名外企、跨国巨头持续布局深圳，不仅是被这座城市开放程度高、经济活力强、创新氛围浓、产业体系完整高效等优势所吸引，不断优化的市场化、法治化、国际化营商环境也是“磁力”所在。\n\n深圳始终坚持“心诚+行程”面向全球招引，出台一系列政策持续扩大开放合作领域，颁布实施《深圳经济特区外商投资条例》，不断完善促进外商投资的服务体系，努力打造“全球最佳投资首选地”，让外资企业进得来、留得住、发展好、发展快。", "summary": null, "source": "Tavily Search", "url": "https://news.qq.com/rain/a/20260224A01LT800", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.238028", "analyzed_at": null, "raw_data": "{\"score\": 0.95565146, \"query\": \"麥當勞 2026\"}"}, {"id": 2848, "title": "外资持续看好深圳布局深圳2025年我市新设外商投资 ... - 鹏城新力", "content": "## 外资持续看好深圳布局深圳 2025年我市新设外商投资企业数量位列全国首位\n\n2026/02/25\n\n深圳新闻网2026年2月24日讯（深圳特区报记者 吴亚男）过去一年，全球有超110个国家和地区来深投资，美国杜邦、法国达索、法国德高、英国BP石油、瑞典海克斯康等知名外资企业纷纷在深新设企业或追加投资，一批高“含金量”“含新量”外资项目竞相落地……一笔笔投资、一个个项目背后，是全球投资者对深圳发展机遇的持续看好。\n\n开放创新的深圳，是世界观察中国的重要窗口，更是全球投资的热土。数据显示，2025年，我市实际使用外资504.8亿元、增长14.4%，规模跃居全国城市第二；新设外资企业约1.6万家、增长63.3%，数量位列全国大中城市首位。\n\n外资引力场持续增强 5年新设外企约4.4万家\n\n2026年1月1日，一座独具特色的“美术馆”亮相深圳湾。这家以未来主义美学为灵感、柔和粉彩为主调的“深圳麦麦美术馆”，是深圳麦当劳将美学理念融入消费场景打造的创新门店，为市民带来“艺术+美食”沉浸式体验。\n\n“作为麦当劳在中国内地首家门店的诞生地，深圳始终承载着品牌创新试验田的核心使命。‘深圳麦麦美术馆’正是我们从用餐空间向体验式消费新地标迈进的重要一步。”麦当劳中国副总裁、深圳市场高级总经理赵崇基表示。\n\n作为首批进入深圳的外资企业，30多年来，麦当劳持续深耕深圳以及大湾区市场，加速门店布局，落地创新消费场景。目前，以深圳为核心，辐射东莞、惠州及粤西地区的麦当劳餐厅总数已突破900家。\n\n凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。 [...] 从生产制造到研发创新，深圳吸引外资结构正持续优化。2025年，深圳全市高技术产业实际使用外资超230亿元，占全市总量四成以上。\n\n目前，深圳拥有外资研发中心超200个，研发人员超3万人。苹果、西门子、星巴克、TÜV莱茵集团、法国达索等跨国企业纷纷在深设立创新中心、研发及制造基地。\n\n“深圳是中国新能源汽车产业发展较早的城市之一，拥有较为完善的新能源汽车产业基础。”法雷奥智能系统事业部中国区高级运营总监贺显军表示，法雷奥深圳工厂经过20年发展，已成为法雷奥集团智能系统最大的生产基地和电子研发中心之一。“我们将持续以深圳工厂为载体，深化在智能驾驶、智能座舱领域的技术迭代与产能优化，夯实在华投资发展根基。”贺显军说。\n\n营商环境持续优化\n\n打造全球最佳投资首选地\n\n“在迪卡侬的全球版图中，深圳早已不只是零售市场，更是全球供应链中不可或缺的重要一环。”2026年是迪卡侬进入深圳20周年，从南山欧洲城首店到全市14家门店，迪卡侬已经从零售商成长为“城市体育生态共建者”。\n\n迪卡侬零售深圳区域总监熊赟丹表示，得益于深圳持续优化的营商环境与开放包容的产业生态， 迪卡侬在深圳实现从智能生产、零售网络到全产业链体系布局。\n\n返回列表 [...] 凭借开放程度高、经济活力强、创新氛围浓、营商环境优越，深圳已成为众多外商投资企业布局中国市场的重要战略选择。\n\n数据显示，“十四五”期间，深圳五年新设外商投资企业4.4万家、占全国比重16.2%，实际利用外资超3000亿元、较“十三五”增长18.9%。截至目前，全球共有180个国家和地区来深投资，累计在深投资的世界500强企业超340家，来自发达经济体的外资企业加速云集，深圳作为跨国投资热土的含金量持续提升。\n\n今年1月，深圳举办“2026外企新春交流活动”，吸引西门子、莱茵TÜV、博世等14家全球知名领军企业以及外国商协会代表参与。通过走访产业园区、座谈交流，企业实地感受深圳的产业生态、政策优势与发展机遇。\n\n“此次活动不仅让我们看到了‘深圳速度’，更深刻感受到了‘深圳质量’与‘深圳创新’。”中国欧盟商会华南分会代表表示，深圳优越的营商环境、清晰的产业规划以及务实高效的政策支持，极大地增强了欧盟企业在深圳长期发展的信心。\n\n投资结构向新向优 全球创新要素加速“卡位”\n\n前不久，渣打银行大湾区首家优先私人理财中心落地深圳，成为继汇丰、恒生、东亚后第4家在深圳布局此类财富管理特色机构的外资银行。\n\n近年来，金融业成为深圳吸引外资的重要领域，外资银行通过多种方式，持续加大在深布局力度。开泰银行、招商永隆银行、中信银行国际、华侨银行在深设立金融科技子公司；星展银行先后三次投资增持深圳农商行；大新银行设立全国首家“双牌照”银行；西班牙桑坦德银行获批设立深圳分行……深圳外资银行机构数量和业务规模长期稳居国内城市前三。\n\n外资外企加速布局深圳，用真金白银投下“信任票”。这既源于外资在深圳看到并收获实实在在的发展机遇，也得益于深圳不断完善的先进制造产业链和创新生态链，吸引全球创新要素加速集聚。", "summary": null, "source": "Tavily Search", "url": "http://www.pengchengenergy.com/content/2026-02/25/content_31956104.html", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.236425", "analyzed_at": null, "raw_data": "{\"score\": 0.9658996, \"query\": \"麥當勞 2026\"}"}, {"id": 2847, "title": "麦当劳×马力欧联名来了🤩全套收藏！ | 社区美国生活精选", "content": "$20.00 ~~$40.00~~\n\n 超全汇总！持续更新2026美国演唱会终极指南🔥刘若英/林宥嘉/告五人/BTS/YE/Cardi B\n [2025年10大免费海外电影电视剧网站推荐，播放速度快，无广告！ [实时更新]](/guide/976446)\n 职业排期全面回暖，亲属移民突然提速！2026年4月最新绿卡排期发布｜美国移民绿卡攻略\n 2025美国热门英文名字男生/女生英文名1000个排行！\n 网球党别刷了⚠️lululemon春季网球装备杀疯了🎾是要逼我天天泡球场吗！\n 是我们懒人有救了！从写文档、做表格到开会翻译，这次有人一次性帮我们全做了！🔥\n 好看的电 nt_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.235425", "analyzed_at": null, "raw_data": "{\"score\": 0.98582757, \"query\": \"麥當勞 2026\"}"}, {"id": 2845, "title": "麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新", "content": "## 新浪山东 资讯\n\n  \n\n### 确定不再关注此人吗\n\n麦当劳中国宣布正式开启第十二届“派Day”。 即日起至2026年3月15日，麦当劳派Day以“心想派成，吃派就对”为主题，倾听粉丝呼声，在超值吃派传统之外，更以全新“双拼迷你派”形式，让苹果派与香蕉派惊喜返场，实现一次品尝两款人气口味的愿望。派Day期间，顾客可以最低3.14元的价格选购经典香芋派、菠萝派等多款派产品。与此同时，为打造更具仪式感的节日体验，麦当劳在社交媒体上收集了粉丝对派产品的真挚反馈与热爱，并将真实“吃派心声”融入产品包装并覆盖多个城市的户外广告中，通过多种形式共同庆祝这一与粉丝双向奔赴的年度品牌节日。\n\n  ) \n\n麦当劳派Day首次上新苹果香蕉双拼迷你派，一盒享用两款经典口味\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱\n\n派是麦当劳口味最丰富的产品之一。每年的3月14日是世界圆周率日，因“派”与“π”谐音，麦当劳中国便将每年3月14日设为“派Day”，邀请粉丝一起来吃派庆祝。自2015年起，派Day已逐渐发展为粉丝心中独具仪式感的品牌节日，在社交媒体上，分享麦当劳派的口味、交流吃派体验已成为粉丝们的日常。以人气产品苹果派为例，自2024年8月限时售卖后至今，顾客在社交媒体持续分享近万条呼唤其再次回归的相关内容。今年派Day，麦当劳以“心想派成，吃派就对”为主题，不仅让呼声最高的苹果派与香蕉派同期回归，更以双拼迷你派的创新形式联袂亮相，一款产品即可享用两款人气美味。\n\n粉丝心声印上派盒，户外广告“喊话”回归\n\n为回应粉丝长久以来对麦当劳派产品的支持与热爱，品牌精选粉丝在社交平台分享的真实内容——有对怀念口味的深情呼唤，也有关于派的不同吃法与口味阵营的有趣讨论——并将这些心声融入全新包装设计。一份份真实的喜爱，由此被印在派盒之上，成为可以触碰的“粉丝时刻”。 [...] 这份热爱也延续至线下。活动期间，上海地铁2号线静安寺站站台被派Day主题装点一新——粉丝在社交媒体上发布的文案跃上广告灯箱，让那些真挚的期待被更多人看见。品牌亦借此回应：“心心念念的派回来了，来麦当劳一起庆祝。”与此同时，全国超过50座城市同步上线指路形式的户外广告，迎接广大粉丝前往就近的麦当劳餐厅，品尝记忆中的味道，与热爱再度相逢。\n\n  ) \n\n上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day\n\n2026年3月9日至3月15日，顾客可通过到店取餐及麦乐送购买指定派产品。经典产品香芋派与菠萝派以3.14元的“派Day记忆价”超值回归，全新“苹果香蕉双拼迷你派”则以5.92元的超值价格加入节日促销阵容——3.14与5.92，巧妙呼应了国际圆周率日的3.141592……数字巧思。全新的苹果迷你派采用法式千层酥皮，内馅融入清新苹果粒与淡淡肉桂香气；香蕉迷你派呈现香蕉浓郁醇厚的香甜风味。通过双拼迷你派的创新形式，一次品尝两款回归的人气口味，开启一场诚意满满的吃派狂欢。\n\n分享文章到:   \"分享到微博\")\n\n;)\n\n## 相关新闻\n\n## 推荐阅读\n\n加载中...", "summary": null, "source": "Tavily Search", "url": "https://sd.sina.cn/news/2026-03-09/detail-inhqkhim6881244.d.html?oid=3813698848643489&vt=4", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T19:57:45.920877", "collected_at": "2026-03-23T19:58:07.232869", "analyzed_at": null, "raw_data": "{\"score\": 0.9967013, \"query\": \"麥當勞 2026\"}" 價就如同狗，狗有時走在主人的前面，有時走在後面， 不過終究會回到主人的身邊，意味著長期而言股價仍會回歸基本面。 40 金融小語彙 英語俗諺說 「每隻狗都有牠得意的一天」 （every dog has his day） ， 意思是說低潮總會過去，好運一定會來到，人人都有走運的時候。 ~2023.2.23 小編加碼來報報~ 2 月23 日應該是所有汪星人最得意的一天了 ， 狗派 粉絲，記得回家多給愛犬幾片餅乾，向狗寶貝說一聲謝 謝牠們的陪伴喔！ 41 金融小語彙 前英格蘭銀行首席經濟學家Haldane： 「金融管制最好如狗接飛盤」 [...] 國民眾批評。英格蘭銀行（Bank of England, BoE）甚至曾因使用的原 物料含有動物油脂，招致素食者及一些宗教團體的反彈聲浪。 ~2025.9.12 小編加碼來報報~ 其實 ， 本行也曾發行過塑膠鈔券喔！回顧1999 年 6 月15 日，當時為慶祝新台幣發行50 週年，本行曾 發行面額50 元塑膠鈔券！這張紀念性質的塑膠鈔券 雖可在市面上流通 ， 卻幾乎沒有民眾在交易時拿到過 ， 因為大家都會留做紀念，捨不得拿出來使用。這張塑 膠鈔券係本行迄今唯一一次發行過的塑膠鈔券，限量 印製3,000 萬張。 35 通膨相關知識 【金融小語彙】 37 金融小語彙 投資界俗話「死貓反彈」 2 月22 日是日本的「貓之日」 （猫の日）。「貓之日」是在1987 年，由愛貓人士組成的貓之日執行委員會與日本寵物食品協會共同制 定，目的係為了對與貓一起生活的幸福表達感謝之意，並與貓一同慶 祝這份喜悅。另外，日語 「2」 的讀音和形容貓叫聲的擬聲詞 「にゃん」 （nyan）相似，因此將2 月22 日訂為「貓之日」。 說到「貓之日」，不禁聯想到與貓相關的股市用語「死貓反彈」 （dead cat bounce）。「死貓反彈」意指股價或指數在大幅下跌的趨勢 中，短暫出現的小幅反彈。此一語彙來自於投資界的俗話：「如果從 高處掉下來，即使是死貓也會反彈。」（Even a dead cat will bounce if dropped from a height.） 1985 年12 月初，英國《金融時報》首度使用「死貓反彈」乙詞。 報導中指出，一位股市經理人將新加坡、馬來西亞股市急遽下跌又出 38 金融小語彙 現回升的跡象，比喻為「死貓反彈」。在那之後，新加坡、馬來西亞 經濟一直在走下坡，直到幾年後才好轉。 ~2023.2.22 小編加碼來報報~ 其實 ， 國際間有許多慶祝專屬貓咪的節日 ， [...] 謝牠們的陪伴喔！ 41 金融小語彙 前英格蘭銀行首席經濟學家Haldane： 「金融管制最好如狗接飛盤」 小狗雖然沒學過萬有引力等高深的物理學，但不論飼主如何變換 拋出角度，甚至風向改變，小狗最終都能接住飛盤。而聰明的物理學 家，卻未必能每一次都接住飛盤，猶如複雜的金融監管制度無法接住 名為金融危機的飛盤。 前英格蘭銀行（Bank of England, BoE）首席經濟學家Andy Haldane，於2012 年8 月31 日全球央行年會上，以「小狗與飛盤」 （The Dog and The Frisbee）為題發表演說，反思何以小狗可精準接住 飼主丟出的飛盤，經濟學家卻無法接住名為「危機」的飛盤。 小狗能順利接住飛盤的祕訣其實很簡單，或者不要把問題想得太 複雜。小狗接飛盤依循的經驗法則如下：盯住飛盤的視線角度保持大 致不變的情況下，向前奔跑，而人類亦可依循相同規則。 42 金融小語彙 經濟學家", "summary": null, "source": "Tavily Search", "url": "https://www.cbc.gov.tw/public/data/data/%E4%B8%AD%E5%A4%AE%E9%8A%80%E8%A1%8C%E8%87%89%E6%9B%B8%E8%B2%BC%E6%96%87%E7%B3%BB%E5%88%97%E5%B0%88%E6%9B%B8III.pdf", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T17:10:13.970068", "collected_at": "2026-03-23T17:10:27.735440", "analyzed_at": null, "raw_data": "{\"score\": 0.09067929, \"query\": \"麥當勞 活動 最新\"}"}, {"id": 2574, "title": "抢点麦当劳优惠券？让OpenClaw来！ - 腾讯云", "                         <path d="M9.5 17.5C9.5 16.5 10.5 16 11 17L12 18L13 17C13.5 16 14.5 16.5 14.5 17.5V20" stroke="#FFC72C" stroke-width="1.2" stroke-linecap="round" fill="none"/>
                    </svg>
                </div>
                <div>
                    <h1>麥當勞輿情監控</h1>
                    <span class="logo-subtitle">Brand Sentiment Monitor</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="status-indicator" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">系統運行中</span>
                </div>
            </div>
        </div>
    </header>
    
    <!-- 背景裝飾物 -->
    <div class="decor-element" style="top: 15%; left: 5%; font-size: 24px;">🍔</div>
    <div class="decor-element" style="top: 25%; right: 8%; font-size: 20px;">🍟</div>
    <div class="decor-element" style="top: 60%; left: 3%; font-size: 30px;">🥤</div>
    <div class="mccoin decor-element" style="top: 40%; right: 4%; transform: scale(0.8);">M</div>
    <div class="mccoin decor-element" style="top: 75%; left: 10%; transform: scale(1.2);">M</div>
    <div class="mccoin decor-element" style="top: 20%; left: 50%; transform: scale(0.7);">M</div>

    <main class="main-content">
        <!-- 統計卡片 -->
        <section class="stats-section" id="stats-section">
            <div class="stats-grid">
                <div class="stat-card stat-total" id="stat-total">
                    <div class="stat-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-total-value">—</span>
                        <span class="stat-label">總文章數</span>
                    </div>
                    <div class="stat-bg-pattern"></div>
                </div>
                <div class="stat-card stat-positive" id="stat-positive">
                    <div class="stat-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-positive-value">—</span>
                        <span class="stat-label">正面評價</span>
                    </div>
                    <div class="stat-ring">
                        <svg viewBox="0 0 36 36">
                            <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="ring-fill ring-positive" id="ring-positive" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                    </div>
                </div>
                <div class="stat-card stat-negative" id="stat-negative">
                    <div class="stat-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-negative-value">—</span>
                        <span class="stat-label">負面評價</span>
                    </div>
                    <div class="stat-ring">
                        <svg viewBox="0 0 36 36">
                            <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="ring-fill ring-negative" id="ring-negative" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                    </div>
                </div>
                <div class="stat-card stat-neutral" id="stat-neutral">
                    <div class="stat-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-neutral-value">—</span>
                        <span class="stat-label">中立評價</span>
                    </div>
                    <div class="stat-ring">
                        <svg viewBox="0 0 36 36">
                            <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="ring-fill ring-neutral" id="ring-neutral" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                    </div>
                </div>
            </div>
        </section>

        <!-- AI 智能摘要看板 -->
        <section class="ai-insight-panel">
            <div class="insight-grid">
                <div class="insight-card insight-positive">
                    <div class="insight-header">
                        <span class="insight-tag">😊 正面亮點</span>
                    </div>
                    <p id="summary-positive">載入中...</p>
                </div>
                <div class="insight-card insight-negative">
                    <div class="insight-header">
                        <span class="insight-tag">😟 負面痛點</span>
                    </div>
                    <p id="summary-negative">載入中...</p>
                </div>
                <div class="insight-card insight-neutral">
                    <div class="insight-header">
                        <span class="insight-tag">😐 綜合觀察</span>
                    </div>
                    <p id="summary-neutral">載入中...</p>
                </div>
            </div>
        </section>

        <!-- 圖表區域 -->
        <section class="charts-section" id="charts-section">
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <h2>情感趨勢</h2>
                        <div class="chart-controls">
                            <button class="chip active" onclick="updateChartDays(7, this)" id="chart-7d">7 天</button>
                            <button class="chip" onclick="updateChartDays(14, this)" id="chart-14d">14 天</button>
                            <button class="chip" onclick="updateChartDays(30, this)" id="chart-30d">30 天</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="trend-chart"></canvas>
                    </div>
                </div>
                <div class="chart-card chart-pie-card">
                    <div class="chart-header">
                        <h2>來源分佈</h2>
                    </div>
                    <div class="chart-container chart-pie-container">
                        <canvas id="source-pie-chart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 篩選與文章列表 -->
        <section class="articles-section" id="articles-section">
            <div class="section-header">
                <h2>📰 最新文章</h2>
                <div class="filters" id="filters">
                    <select id="filter-sentiment" onchange="loadArticles()">
                        <option value="all">所有情感</option>
                        <option value="positive">😊 正面</option>
                        <option value="negative">😟 負面</option>
                        <option value="neutral">😐 中立</option>
                    </select>
                    <select id="filter-source" onchange="loadArticles()">
                        <option value="all">所有來源</option>
                        <option value="Google News">Google News</option>
                        <option value="PTT">PTT</option>
                        <option value="Dcard">Dcard</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Google Reviews">Google 評論</option>
                        <option value="Tavily Search">Tavily Search</option>
                        <option value="DuckDuckGo Search">DuckDuckGo Search</option>
                    </select>
                    <select id="filter-days" onchange="loadArticles()">
                        <option value="7">近 7 天</option>
                        <option value="14">近 14 天</option>
                        <option value="30">近 30 天</option>
                    </select>
                </div>
            </div>

            <div class="articles-list" id="articles-list">
                <div class="loading-placeholder">
                    <div class="spinner"></div>
                    <p>載入中...</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </section>

        <!-- 執行記錄 -->
        <section class="logs-section" id="logs-section">
            <div class="section-header">
                <h2>📋 執行記錄</h2>
                <button class="btn btn-secondary" onclick="loadLogs()">重新整理</button>
            </div>
            <div class="logs-table-wrapper" id="logs-table-wrapper">
                <table class="logs-table" id="logs-table">
                    <thead>
                        <tr>
                            <th>執行時間</th>
                            <th>搜集</th>
                            <th>分析</th>
                            <th>正面</th>
                            <th>負面</th>
                            <th>中立</th>
                            <th>通知</th>
                            <th>狀態</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <tr><td colspan="8" class="empty-state">尚無執行記錄</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 頁尾 -->
    <footer class="footer" id="footer">
        <p>🍔 麥當勞品牌輿情監控系統 &copy; 2026 | Powered by Flask + LLM</p>
    </footer>

    <!-- 載入通知 toast -->
    <div class="toast-container" id="toast-container"></div>

    <script src="static/js/main.js"></script>
</body>
</html>
