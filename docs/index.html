變身為甜心卡主角，主打「霹靂英雄的日常」，包含素還真手拿金黃薯條、一頁書品味咖啡、葉小釵迷上冰炫風，讓原本正經八百的江湖高手們，展現出反差感，絕對是霹靂迷今年必入手逸品。\n\n2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n優惠同步升級！2026年甜心卡自即起開賣至明年3月底，持續享有「買A送B」的超強CP值，今年A區選項正式納入「金選咖啡」系列，包含金選美式（冰/熱）與金選那堤（冰/熱）；加碼兩項限定好禮，於3/18至4/14期間，只要在麥當勞APP完成甜心卡數位綁定，就能免費下載「霹靂甜心卡LINE貼圖」（共16款）以及「角色載具桌布」（共6款）。\n\n2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n麥當勞 2026「霹靂甜心卡」\n\n．販售日期： 2026年3月18日起至售完為止。\n\n．優惠期限： 2026年3月18日起至2027年3月31日止。\n\n．售價： 每張39元（含實體卡1張及數位序號1組）；套卡組117元（含3款實體卡各1張及數位序號3組）。\n\n．數位好禮： 4月14日前完成APP綁定，加碼送LINE貼圖、角色桌布。\n\n2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n編輯推薦 [...] 2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n編輯推薦\n\n 夜貓子開涮！ 石二鍋加開「宵夜場」 全台37門市營業到深夜時段　免服務費、這時間進場「免費送肉盤」\n 養心集團3月「專寵會員」！ 養心沙龍「688元蔬食吃到飽」平日快閃新店裕隆城 加碼「滿千送菜」\n\n想知道更多旅遊美食好康情報，請鎖定「udn旅遊美食站」．追蹤「udn走跳世界」\n\n麥當勞 霹靂布袋戲 甜心卡 薯條\n\n### 相關新聞\n\n### 「達美樂x三麗鷗」聯名第2彈！吃披薩送盲盒、買大送大 「酷洛米、美樂蒂鍵帽」限時1天免費送\n\n達美樂與三麗鷗合作推出第二彈聯名活動，推出「萌力滿點套餐」，內含精美的發光鍵帽盲盒及可愛限量披薩盒。3月22日，內湖門市將舉辦免費贈送盲盒活動，限量200個，粉絲需提前到店拍照打卡。活動同時推出「買大送大」披薩優惠，數量有限，敬請把握。\n\n### 封印解除！壽司郎推《庫洛魔法使》聯名餐點滿額再送透明牌，還有草莓蛋糕、夢之杖掀回憶殺\n\n壽司郎攜手《庫洛魔法使》自3月23日起推出期間限定聯名餐點，粉絲可享受草莓蛋糕、夢之杖叉匙組等美味與收藏樂趣。消費滿額可獲得透明牌透卡，結合角色化設計與拍照機會，帶來滿滿童年回憶。\n\n### 「傑克兄弟牛排」沒消失！ 咖啡龍頭「路易莎」宣布接手營運 挑戰最頂Brunch＋高CP值排餐\n\n台灣咖啡龍頭「路易莎集團」正式併購「傑克兄弟牛排館」，將以懷舊美式風格結合Brunch文化，挑戰高CP值排餐。這一轉變令眾多老饕感到驚喜，期待品牌的新生。\n\n### 台北艾麗酒店 「2026年謝師宴早鳥登場」！中西自助饗宴每位1,080元起，再送教師用餐免費與Haagen-Dazs\n\n台北艾麗酒店推出「感謝有您」謝師宴專案，從2026年5月1日至8月31日，提供中西自助饗宴，每位1,080元起。教師可享免費用餐或Haagen-Dazs冰淇淋，打造難忘畢業聚會體驗。 [...] ### 台南三井二期Outlet開幕慶！ 「蘋果樹蛋包飯」限量50組買1送1、「麵屋一燈火山拉麵」首周限時88折、滿額送半價券\n\n台南三井OUTLET二期正式開幕，超人氣「蘋果樹蛋包飯」即日推出限量買一送一活動，還有「麵屋一燈」首次88折優惠，吸引饕客前來體驗美食盛宴！\n\n### 凱撒飯店春季住房主打 「住北送南」超狂升級雙城旅遊體驗，再送Buffet吃到飽\n\n凱撒飯店春季推出「好宿成雙」住房專案，4月1日至4月30日入住北部飯店者，可獲南部或東部住宿券，享雙城旅遊體驗，每晚價格自4,999元起，另提供餐券優惠，滿足多樣旅遊需求。\n\n### 贊助廣告\n\n### udn討論區\n\n共 0 則留言\n\n規範 \n\n             \") \n\n發布\n\n 張貼文章或下標籤，不得有違法或侵害他人權益之言論，違者應自負法律責任。\n 對於明知不實或過度情緒謾罵之言論，經網友檢舉或本網站發現，聯合新聞網有權逕予刪除文章、停權或解除會員資格。不同意上述規範者，請勿張貼文章。\n 對於無意義", "summary": null, "source": "Tavily Search", "url": "https://travel.udn.com/travel/story/7193/9387419?from=udn-catelistnews_ch2", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T15:07:47.166140", "collected_at": "2026-03-23T15:08:06.710046", "analyzed_at": null, "raw_data": "{\"score\": 0.9988305, \"query\": \"麥當勞 活動 2026\"}"}, {"id": 2008, "title": "麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新", "content": "## 粤港澳都市网\n\n# 麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新\n\n2026-03-10 16:39:44\n\n0; \"赞\")   0; \"踩\")   0; \"评论\")   收藏; \"收藏\")\n\n3月10日，麦当劳中国宣布正式开启第十二届“派Day”。2026年3月9日起至3月15日，麦当劳派Day以“心想派成，吃派就对”为主题，倾听粉丝呼声，在超值吃派传统之外，更以全新“双拼迷你派”形式，让苹果派与香蕉派惊喜返场，实现一次品尝两款人气口味的愿望。派Day期间，顾客可以最低3.14元的价格选购经典香芋派、菠萝派等多款派产品。与此同时，为打造更具仪式感的节日体验，麦当劳在社交媒体上收集了粉丝对派产品的真挚反馈与热爱，并将真实“吃派心声”融入产品包装并覆盖多个城市的户外广告中，通过多种形式共同庆祝这一与粉丝双向奔赴的年度品牌节日。\n\n麦当劳派Day首次上新苹果香蕉双拼迷你派，一盒享用两款经典口味\n\n为庆祝这一年度品牌节日，3月8日，深圳麦当劳在位于海上世界商圈的望海路餐厅，举办了一场别开生面的派Day狂欢活动，邀请粉丝及顾客共庆派Day，抢先品尝苹果香蕉双拼迷你派。现场音乐律动与派的甜蜜滋味交织，打造出轻松潮流的社交氛围，为年轻人群提供了一处“以派会友”的互动空间。活动不仅传递了麦麦人情味的温暖，更让派Day成为连接彼此、分享快乐的社交时刻。\n\n深圳麦当劳派Day活动\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱 [...] 深圳麦当劳派Day活动\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱\n\n派是麦当劳口味最丰富的产品之一。每年的3月14日是世界圆周率日，因“派”与“π”谐音，麦当劳中国便将每年3月14日设为“派Day”，邀请粉丝一起来吃派庆祝。自2015年起，派Day已逐渐发展为粉丝心中独具仪式感的品牌节日，在社交媒体上，分享麦当劳派的口味、交流吃派体验已成为粉丝们的日常。以人气产品苹果派为例，自2024年8月限时售卖后至今，顾客在社交媒体持续分享近万条呼唤其再次回归的相关内容。今年派Day，麦当劳以“心想派成，吃派就对”为主题，不仅让呼声最高的苹果派与香蕉派同期回归，更以双拼迷你派的创新形式联袂亮相，一款产品即可享用两款人气美味。\n\n粉丝心声印上派盒，户外广告“喊话”回归\n\n为回应粉丝长久以来对麦当劳派产品的支持与热爱，品牌精选粉丝在社交平台分享的真实内容——有对怀念口味的深情呼唤，也有关于派的不同吃法与口味阵营的有趣讨论——并将这些心声融入全新包装设计。一份份真实的喜爱，由此被印在派盒之上，成为可以触碰的“粉丝时刻”。\n\n这份热爱也延续至线下。活动期间，上海地铁2号线静安寺站站台被派Day主题装点一新——粉丝在社交媒体上发布的文案跃上广告灯箱，让那些真挚的期待被更多人看见。品牌亦借此回应：“心心念念的派回来了，来麦当劳一起庆祝。”与此同时，全国超过50座城市同步上线指路形式的户外广告，迎接广大粉丝前往就近的麦当劳餐厅，品尝记忆中的味道，与热爱再度相逢。\n\n上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day [...] 上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day\n\n2026年3月9日至3月15日，顾客可通过到店取餐及麦乐送购买指定派产品。经典产品香芋派与菠萝派以3.14元的“派Day记忆价”超值回归，全新“苹果香蕉双拼迷你派”则以5.92元的超值价格加入节日促销阵容——3.14与5.92，巧妙呼应了国际圆周率日的3.141592……数字巧思。全新的苹果迷你派采用法式千层酥皮，内馅融入清新苹果粒与淡淡肉桂香气；香蕉迷你派呈现香蕉浓郁醇厚的香甜风味。通过双拼迷你派的创新形式，一次品尝两款回归的人气口味，开启一场诚意满满的吃派狂欢。\n\n粤港澳都市网为您提供最新资讯\n\n0: 0\n\n### 更多相关内容\n\n ### 麦当劳开启2026年派Day欢庆，苹果香蕉双拼  "published_at": "2026-03-23T15:07:42.227185", "collected_at": "2026-03-23T15:08:06.682133", "analyzed_at": null, "raw_data": "{\"score\": 0.63179934, \"query\": \"麥當勞 最新\"}"}, {"id": 1999, "title": "麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新 - 新浪山东", "content": "## 新浪山东 资讯\n\n  \n\n### 确定不再关注此人吗\n\n麦当劳中国宣布正式开启第十二届“派Day”。 即日起至2026年3月15日，麦当劳派Day以“心想派成，吃派就对”为主题，倾听粉丝呼声，在超值吃派传统之外，更以全新“双拼迷你派”形式，让苹果派与香蕉派惊喜返场，实现一次品尝两款人气口味的愿望。派Day期间，顾客可以最低3.14元的价格选购经典香芋派、菠萝派等多款派产品。与此同时，为打造更具仪式感的节日体验，麦当劳在社交媒体上收集了粉丝对派产品的真挚反馈与热爱，并将真实“吃派心声”融入产品包装并覆盖多个城市的户外广告中，通过多种形式共同庆祝这一与粉丝双向奔赴的年度品牌节日。\n\n  ) \n\n麦当劳派Day首次上新苹果香蕉双拼迷你派，一盒享用两款经典口味\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱\n\n派是麦当劳口味最丰富的产品之一。每年的3月14日是世界圆周率日，因“派”与“π”谐音，麦当劳中国便将每年3月14日设为“派Day”，邀请粉丝一起来吃派庆祝。自2015年起，派Day已逐渐发展为粉丝心中独具仪式感的品牌节日，在社交媒体上，分享麦当劳派的口味、交流吃派体验已成为粉丝们的日常。以人气产品苹果派为例，自2024年8月限时售卖后至今，顾客在社交媒体持续分享近万条呼唤其再次回归的相关内容。今年派Day，麦当劳以“心想派成，吃派就对”为主题，不仅让呼声最高的苹果派与香蕉派同期回归，更以双拼迷你派的创新形式联袂亮相，一款产品即可享用两款人气美味。\n\n粉丝心声印上派盒，户外广告“喊话”回归\n\n为回应粉丝长久以来对麦当劳派产品的支持与热爱，品牌精选粉丝在社交平台分享的真实内容——有对怀念口味的深情呼唤，也有关于派的不同吃法与口味阵营的有趣讨论——并将这些心声融入全新包装设计。一份份真实的喜爱，由此被印在派盒之上，成为可以触碰的“粉丝时刻”。 [...] 这份热爱也延续至线下。活动期间，上海地铁2号线静安寺站站台被派Day主题装点一新——粉丝在社交媒体上发布的文案跃上广告灯箱，让那些真挚的期待被更多人看见。品牌亦借此回应：“心心念念的派回来了，来麦当劳一起庆祝。”与此同时，全国超过50座城市同步上线指路形式的户外广告，迎接广大粉丝前往就近的麦当劳餐厅，品尝记忆中的味道，与热爱再度相逢。\n\n  ) \n\n上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day\n\n2026年3月9日至3月15日，顾客可通过到店取餐及麦乐送购买指定派产品。经典产品香芋派与菠萝派以3.14元的“派Day记忆价”超值回归，全新“苹果香蕉双拼迷你派”则以5.92元的超值价格加入节日促销阵容——3.14与5.92，巧妙呼应了国际圆周率日的3.141592……数字巧思。全新的苹果迷你派采用法式千层酥皮，内馅融入清新苹果粒与淡淡肉桂香气；香蕉迷你派呈现香蕉浓郁醇厚的香甜风味。通过双拼迷你派的创新形式，一次品尝两款回归的人气口味，开启一场诚意满满的吃派狂欢。\n\n分享文章到:   \"分享到微博\")\n\n;)\n\n## 相关新闻\n\n## 推荐阅读\n\n加载中...", "summary": null, "source": "Tavily Search", "url": "https://sd.sina.cn/news/2026-03-09/detail-inhqkhim6881244.d.html?oid=3860186895049040&vt=4", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T15:07:39.342922", "collected_at": "2026-03-23T15:08:06.675576", "analyzed_at": null, "raw_data": "{\"score\": 0.9972638, \"query\": \"麥當勞 2026\"}"}, {"id": 19 潮流的社交氛围，为年轻人群提供了一处“以派会友”的互动空间。活动不仅传递了麦麦人情味的温暖，更让派Day成为连接彼此、分享快乐的社交时刻。\n\n深圳麦当劳派Day活动\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱 [...] 深圳麦当劳派Day活动\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱\n\n派是麦当劳口味最丰富的产品之一。每年的3月14日是世界圆周率日，因“派”与“π”谐音，麦当劳中国便将每年3月14日设为“派Day”，邀请粉丝一起来吃派庆祝。自2015年起，派Day已逐渐发展为粉丝心中独具仪式感的品牌节日，在社交媒体上，分享麦当劳派的口味、交流吃派体验已成为粉丝们的日常。以人气产品苹果派为例，自2024年8月限时售卖后至今，顾客在社交媒体持续分享近万条呼唤其再次回归的相关内容。今年派Day，麦当劳以“心想派成，吃派就对”为主题，不仅让呼声最高的苹果派与香蕉派同期回归，更以双拼迷你派的创新形式联袂亮相，一款产品即可享用两款人气美味。\n\n粉丝心声印上派盒，户外广告“喊话”回归\n\n为回应粉丝长久以来对麦当劳派产品的支持与热爱，品牌精选粉丝在社交平台分享的真实内容——有对怀念口味的深情呼唤，也有关于派的不同吃法与口味阵营的有趣讨论——并将这些心声融入全新包装设计。一份份真实的喜爱，由此被印在派盒之上，成为可以触碰的“粉丝时刻”。\n\n这份热爱也延续至线下。活动期间，上海地铁2号线静安寺站站台被派Day主题装点一新——粉丝在社交媒体上发布的文案跃上广告灯箱，让那些真挚的期待被更多人看见。品牌亦借此回应：“心心念念的派回来了，来麦当劳一起庆祝。”与此同时，全国超过50座城市同步上线指路形式的户外广告，迎接广大粉丝前往就近的麦当劳餐厅，品尝记忆中的味道，与热爱再度相逢。\n\n上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day [...] 上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day\n\n2026年3月9日至3月15日，顾客可通过到店取餐及麦乐送购买指定派产品。经典产品香芋派与菠萝派以3.14元的“派Day记忆价”超值回归，全新“苹果香蕉双拼迷你派”则以5.92元的超值价格加入节日促销阵容——3.14与5.92，巧妙呼应了国际圆周率日的3.141592……数字巧思。全新的苹果迷你派采用法式千层酥皮，内馅融入清新苹果粒与淡淡肉桂香气；香蕉迷你派呈现香蕉浓郁醇厚的香甜风味。通过双拼迷你派的创新形式，一次品尝两款回归的人气口味，开启一场诚意满满的吃派狂欢。\n\n粤港澳都市网为您提供最新资讯\n\n0: 0\n\n### 更多相关内容\n\n ### 麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新\n\n  ​3月10日，麦当劳中国宣布正式开启第十二届“派Day”。2026年3月9日起至3月15日，麦当劳派Day以“心想派成，吃派就对”为主题，倾听粉丝呼声，在超值吃派传统之外，更以全新“双拼迷你派”形式，让苹果派与香蕉派惊喜返场，实现一次品尝两款人气口味的愿望。派Day期间，顾客可以最低3.14元的价格选购经典香芋派、菠萝派等多款派产品。与此同时，为打造更具仪式感的节日体验，麦当劳在社交媒体上收集了粉丝对派产品的真挚反馈与热爱，并将真实“吃派心声”融入产品包装并覆盖多个城市的户外广告中，通过多种形式共同庆祝这一与粉丝双向奔赴的年度品牌节日。\n\n  云鼎\n\n  企业\n\n  2026-03-10 16:39:45\n\n  0; \"赞\"", "summary": null, "source": "Tavily Search", "url": "https://www.ygacity.com/company/20260310/23005.html", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T15:07:47.166140", "collected_at": "2026-03-23T15:08:06.705999", "analyzed_at": null, "raw_data": "{\"score\": 0.9989759, \"query\": \"麥當勞 活動 2026\"}"}, {"id": 2005, "title": "剩不到10天！！買一送一驚天優惠最新速遞消息！麥當勞多吉懶人包", "content": "id='paint1_radial_15251_63610' cx='0' cy='0 回归的相关内容。今年派Day，麦当劳以“心想派成，吃派就对”为主题，不仅让呼声最高的苹果派与香蕉派同期回归，更以双拼迷你派的创新形式联袂亮相，一款产品即可享用两款人气美味。\n\n粉丝心声印上派盒，户外广告“喊话”回归\n\n为回应粉丝长久以来对麦当劳派产品的支持与热爱，品牌精选粉丝在社交平台分享的真实内容——有对怀念口味的深情呼唤，也有关于派的不同吃法与口味阵营的有趣讨论——并将这些心声融入全新包装设计。一份份真实的喜爱，由此被印在派盒之上，成为可以触碰的“粉丝时刻”。 [...] 这份热爱也延续至线下。活动期间，上海地铁2号线静安寺站站台被派Day主题装点一新——粉丝在社交媒体上发布的文案跃上广告灯箱，让那些真挚的期待被更多人看见。品牌亦借此回应：“心心念念的派回来了，来麦当劳一起庆祝。”与此同时，全国超过50座城市同步上线指路形式的户外广告，迎接广大粉丝前往就近的麦当劳餐厅，品尝记忆中的味道，与热爱再度相逢。\n\n  ) \n\n上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day\n\n2026年3月9日至3月15日，顾客可通过到店取餐及麦乐送购买指定派产品。经典产品香芋派与菠萝派以3.14元的“派Day记忆价”超值回归，全新“苹果香蕉双拼迷你派”则以5.92元的超值价格加入节日促销阵容——3.14与5.92，巧妙呼应了国际圆周率日的3.141592……数字巧思。全新的苹果迷你派采用法式千层酥皮，内馅融入清新苹果粒与淡淡肉桂香气；香蕉迷你派呈现香蕉浓郁醇厚的香甜风味。通过双拼迷你派的创新形式，一次品尝两款回归的人气口味，开启一场诚意满满的吃派狂欢。\n\n分享文章到:   \"分享到微博\")\n\n;)\n\n## 相关新闻\n\n## 推荐阅读\n\n加载中...", "summary": null, "source": "Tavily Search", "url": "https://sd.sina.cn/news/2026-03-09/detail-inhqkhim6881244.d.html?oid=3860186895049040&vt=4", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T15:07:39.342922", "collected_at": "2026-03-23T15:08:06.675576", "analyzed_at": null, "raw_data": "{\"score\": 0.9972638, \"query\": \"麥當勞 2026\"}"}, {"id": 1998, "title": "美國麥當勞將於3/26推出《超級瑪利歐銀河電影版》快樂餐玩具共有 ...", "content": "© 2026\n   Threads Terms\n   Privacy Policy\n   Cookies Policy\n   Report a problem [...] # 美國麥當勞將於3/26推出 《超級瑪利歐銀河電影版》快樂餐玩具 共有12款公仔吊飾🌟🌟🌟 我好想要啊～～～ 不知道之後日本會不會出🥹\n\n[](\n\n[](\n\n[](\n\n# Thread 37.3K views\n\nImage 1: doho_ninten's profile picture\n\ndoho_ninten\n\n任天堂\n\n1d\n\n美國麥當勞將於3/26推出 《超級瑪利歐銀河電影版》快樂餐玩具 共有12款公仔吊飾🌟🌟🌟\n\n我好想要啊～～～ 不知道之後日本會不會出🥹\n\nTranslate\n\nImage 2: May be a cartoon of video games, poster and text that says 'Nintendo + ታዝ ILLUMINATION THE THESUPER MARIO GALAXY MOVIE ONLY IN THEATERS 4/1 HAPPy MEAL® OUT 3/26 ©2026 McDonald's The Happy Meal box designi ist the trademark ofl McDonald's Corporation and its affiliates. Nintendo and Universal City Studios LLC All Rights Reserved.'\n\nImage 3: May be a cartoon of lego, Sonic score\": 0.99895966, \"query\": \"麥當勞 活動 最新\"}"}, {"id": 2009, "title": "麥當勞2026「霹靂甜心卡」開賣！ 3款卡面「素還真拿薯條」萌 ...", "content": "聯合新聞網／ 旅遊美食站 綜合報導\n\n圖／麥當勞2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n這張省錢神卡一定要收！麥當勞每年必備的「甜心卡」迎來20週年，首度超狂跨界聯手台灣布袋戲傳奇「霹靂布袋戲」推出3款超萌聯名卡面。不僅素還真、一頁書、葉小釵破天荒拿起薯條、冰炫風展現「反差萌」，購買還加碼送LINE貼圖與角色桌布，粉絲們快衝！\n\n2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n2026麥當勞甜心卡特別攜手台灣文化象徵「霹靂布袋戲」，將三位家喻戶曉的靈魂人物「素還真、一頁書、葉小釵」變身為甜心卡主角，主打「霹靂英雄的日常」，包含素還真手拿金黃薯條、一頁書品味咖啡、葉小釵迷上冰炫風，讓原本正經八百的江湖高手們，展現出反差感，絕對是霹靂迷今年必入手逸品。\n\n2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n優惠同步升級！2026年甜心卡自即起開賣至明年3月底，持續享有「買A送B」的超強CP值，今年A區選項正式納入「金選咖啡」系列，包含金選美式（冰/熱）與金選那堤（冰/熱）；加碼兩項限定好禮，於3/18至4/14期間，只要在麥當勞APP完成甜心卡數位綁定，就能免費下載「霹靂甜心卡LINE貼圖」（共16款）以及「角色載具桌布」（共6款）。\n\n2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n麥當勞 2026「霹靂甜心卡」\n\n．販售日期： 2026年3月18日起至售完為止。\n\n．優惠期限： 2026年3月18日起至2027年3月31日止。\n\n．售價： 每張39元（含實體卡1張及數位序號1組）；套卡組117元（含3款實體卡各1張及數位序號3組）。\n\n．數位好禮： 4月14日前完成APP綁定，加碼送LINE貼圖、角色桌布。\n\n2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n編輯推薦 [...] 2026麥當勞聯名「霹靂布袋戲」。圖／麥當勞\n\n編輯推薦\n\n 夜貓子開涮！ 石二鍋加開「宵夜場」 全台37門市營業到深夜時段　免服務費、這時間進場「免費送肉盤」\n 養心集團3月「專寵會員」！ 養心沙龍「688元蔬食吃到飽」平日快閃新店裕隆城 加碼「滿千送菜」\n\n想知道更多旅遊美食好康情報，請鎖定「udn旅遊美食站」．追蹤「udn走跳世界」\n\n麥當勞 霹靂布袋戲 甜心卡 薯條\n\n### 相關新聞\n\n### 「達美樂x三麗鷗」聯名第2彈！吃披薩送盲盒、買大送大 「酷洛米、美樂蒂鍵帽」限時1天免費送\n\n達美樂與三麗鷗合作推出第二彈聯名活動，推出「萌力滿點套餐」，內含精美的發光鍵帽盲盒及可愛限量披薩盒。3月22日，內湖門市將舉辦免費贈送盲盒活動，限量200個，粉絲需提前到店拍照打卡。活動同時推出「買大送大」披薩優惠，數量有限，敬請把握。\n\n### 封印解除！壽司郎推《庫洛魔法使》聯名餐點滿額再送透明牌，還有草莓蛋糕、夢之杖掀回憶殺\n\n壽司郎攜手《庫洛魔法使》自3月23日起推出期間限定聯名餐點，粉絲可享受草莓蛋糕、夢之杖叉匙組等美味與收藏樂趣。消費滿額可獲得透明牌透卡，結合角色化設計與拍照機會，帶來滿滿童年回憶。\n\n### 「傑克兄弟牛排」沒消失！ 咖啡龍頭「路易莎」宣布接手營運 挑戰最頂Brunch＋高CP值排餐\n\n台灣咖啡龍頭「路易莎集團」正式併購「傑克兄弟牛排館」，將以懷舊美式風格結合Brunch文化，挑戰高CP值排餐。這一轉變令眾多老饕感到驚喜，期待品牌的新生。\n\n### 台北艾麗酒店 「2026年謝師宴早鳥登場」！中西自助饗宴每位1,080元起，再送教師用餐免費與Haagen-Dazs\n\n台北艾麗酒店推出「感謝有您」謝師宴專案，從2026年5月1日至8月31日，提供中西自助饗宴，每位1,080元起。教師可享免費用餐或Haagen-Dazs冰淇淋，打造難忘畢業聚會體驗。 [...] ### 台南三井二期Outlet開幕慶！ 「蘋果樹蛋包飯」限量50組買1送1、「麵屋一燈火山拉麵」首周限時88折、滿額送半價券\n\n台南三井OUTLET二期正式開幕，超人氣「蘋果樹蛋包飯」即日推出限量買一送一活動，還有「麵屋一燈」首次88折優惠，吸引饕客前來體驗美食盛宴！\n\n### 凱撒飯店春季住房主打 「住北送南」超狂升級雙城旅遊體驗，再送Buffet吃到飽\n\n凱撒飯店春季推出「好宿成雙」住房專案，4月1日至4月30日入住北部飯店者，可獲南部或東部住宿券，享雙城旅遊體驗，每晚價格自4,999元起，另提供餐券優惠，滿足多樣旅遊需求。\n\n### 贊助廣告\n\n### udn討論區\n\n共 0 則留言\n\n規範 \n\n             \") \n\n發布\n\n 張貼文章或下標籤，不得有違法或侵害他人權益之言論，違者應自負法律責任。\n 對於明知不實或過度情緒謾罵之言論，經網友檢舉或本網站發現，聯合新聞網有權逕予刪除文章、停權或解除會員資格。不同意上述規範者，請勿張貼文章。\n 對於無意義", "summary": null, "source": "Tavily Search", "url": "https://travel.udn.com/travel/story/7193/9387419?from=udn-catelistnews_ch2", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T15:07:47.166140", "collected_at": "2026-03-23T15:08:06.710046", "analyzed_at": null, "raw_data": "{\"score\": 0.9988305, \"query\": \"麥當勞 活動 2026\"}"}, {"id": 2008, "title": "麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新", "content": "## 粤港澳都市网\n\n# 麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新\n\n2026-03-10 16:39:44\n\n0; \"赞\")   0; \"踩\")   0; \"评论\")   收藏; \"收藏\")\n\n3月10日，麦当劳中国宣布正式开启第十二届“派Day”。2026年3月9日起至3月15日，麦当劳派Day以“心想派成，吃派就对”为主题，倾听粉丝呼声，在超值吃派传统之外，更以全新“双拼迷你派”形式，让苹果派与香蕉派惊喜返场，实现一次品尝两款人气口味的愿望。派Day期间，顾客可以最低3.14元的价格选购经典香芋派、菠萝派等多款派产品。与此同时，为打造更具仪式感的节日体验，麦当劳在社交媒体上收集了粉丝对派产品的真挚反馈与热爱，并将真实“吃派心声”融入产品包装并覆盖多个城市的户外广告中，通过多种形式共同庆祝这一与粉丝双向奔赴的年度品牌节日。\n\n麦当劳派Day首次上新苹果香蕉双拼迷你派，一盒享用两款经典口味\n\n为庆祝这一年度品牌节日，3月8日，深圳麦当劳在位于海上世界商圈的望海路餐厅，举办了一场别开生面的派Day狂欢活动，邀请粉丝及顾客共庆派Day，抢先品尝苹果香蕉双拼迷你派。现场音乐律动与派的甜蜜滋味交织，打造出轻松潮流的社交氛围，为年轻人群提供了一处“以派会友”的互动空间。活动不仅传递了麦麦人情味的温暖，更让派Day成为连接彼此、分享快乐的社交时刻。\n\n深圳麦当劳派Day活动\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱 [...] 深圳麦当劳派Day活动\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱\n\n派是麦当劳口味最丰富的产品之一。每年的3月14日是世界圆周率日，因“派”与“π”谐音，麦当劳中国便将每年3月14日设为“派Day”，邀请粉丝一起来吃派庆祝。自2015年起，派Day已逐渐发展为粉丝心中独具仪式感的品牌节日，在社交媒体上，分享麦当劳派的口味、交流吃派体验已成为粉丝们的日常。以人气产品苹果派为例，自2024年8月限时售卖后至今，顾客在社交媒体持续分享近万条呼唤其再次回归的相关内容。今年派Day，麦当劳以“心想派成，吃派就对”为主题，不仅让呼声最高的苹果派与香蕉派同期回归，更以双拼迷你派的创新形式联袂亮相，一款产品即可享用两款人气美味。\n\n粉丝心声印上派盒，户外广告“喊话”回归\n\n为回应粉丝长久以来对麦当劳派产品的支持与热爱，品牌精选粉丝在社交平台分享的真实内容——有对怀念口味的深情呼唤，也有关于派的不同吃法与口味阵营的有趣讨论——并将这些心声融入全新包装设计。一份份真实的喜爱，由此被印在派盒之上，成为可以触碰的“粉丝时刻”。\n\n这份热爱也延续至线下。活动期间，上海地铁2号线静安寺站站台被派Day主题装点一新——粉丝在社交媒体上发布的文案跃上广告灯箱，让那些真挚的期待被更多人看见。品牌亦借此回应：“心心念念的派回来了，来麦当劳一起庆祝。”与此同时，全国超过50座城市同步上线指路形式的户外广告，迎接广大粉丝前往就近的麦当劳餐厅，品尝记忆中的味道，与热爱再度相逢。\n\n上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day [...] 上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day\n\n2026年3月9日至3月15日，顾客可通过到店取餐及麦乐送购买指定派产品。经典产品香芋派与菠萝派以3.14元的“派Day记忆价”超值回归，全新“苹果香蕉双拼迷你派”则以5.92元的超值价格加入节日促销阵容——3.14与5.92，巧妙呼应了国际圆周率日的3.141592……数字巧思。全新的苹果迷你派采用法式千层酥皮，内馅融入清新苹果粒与淡淡肉桂香气；香蕉迷你派呈现香蕉浓郁醇厚的香甜风味。通过双拼迷你派的创新形式，一次品尝两款回归的人气口味，开启一场诚意满满的吃派狂欢。\n\n粤港澳都市网为您提供最新资讯\n\n0: 0\n\n### 更多相关内容\n\n ### 麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新\n\n  ​3月10日，麦当劳中国宣布正式开启第十二届“派Day”。2026年3月9日起至3月15日，麦当劳派Day以“心想派成，吃派就对”为主题，倾听粉丝呼声，在超值吃派传统之外，更以全新“双拼迷你派”形式，让苹果派与香蕉派惊喜返场，实现一次品尝两款人气口味的愿望。派Day期间，顾客可以最低3.14元的价格选购经典香芋派、菠萝派等多款派产品。与此同时，为打造更具仪式感的节日体验，麦当劳在社交媒体上收集了粉丝对派产品的真挚反馈与热爱，并将真实“吃派心声”融入产品包装并覆盖多个城市的户外广告中，通过多种形式共同庆祝这一与粉丝双向奔赴的年度品牌节日。\n\n  云鼎\n\n  企业\n\n  2026-03-10 16:39:45\n\n  0; \"赞\"", "summary": null, "source": "Tavily Search", "url": "https://www.ygacity.com/company/20260310/23005.html", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T15:07:47.166140", "collected_at": "2026-03-23T15:08:06.705999", "analyzed_at": null, "raw_data": "{\"score\": 0.9989759, \"query\": \"麥當勞 活動 2026\"}"}, {"id": 2005, "title": "剩不到10天！！買一送一驚天優惠最新速遞消息！麥當勞多吉懶人包", "content": "id='paint1_radial_15251_63610' cx='0' cy='0' r='1' gradientUnits='userSpaceOnUse' gradientTransform='rotate(90 .0005 8) scale(7.99958)'%3E%3Cstop offset='.5618' stop-color='%230866FF' stop-opacity='0'/%3E%3Cstop offset='1' stop-color='%230866FF' stop-opacity='.1'/%3E%3C/radialGradient%3E%3CradialGradient id='paint2_radial_15251_63610' cx='0' cy='0' r='1' gradientUnits='userSpaceOnUse' gradientTransform='rotate(45 -4.5257 10.9237) scale(10.1818)'%3E%3Cstop offset='.3143' stop-color='%2302ADFC'/%3E%3Cstop offset='1' stop-color='%2302ADFC' stop-opacity='0'/%3E%3C/radialGradient%3E%3ClinearGradient id='paint0_linear_15251_63610' x1='2.3989' y1='2.3999' x2='13.5983' y2='13.5993' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%2302ADFC'/%3E%3Cstop offset='.5' [...] stop-color='%2302ADFC'/%3E%3Cstop offset='.5' stop-color='%230866FF'/%3E%3Cst ary": null, "source": "Tavily Search", "url": "https://www.threads.com/@sauce.media.hk/post/DVXvY0nktZp/%E9%BA%A5%E7%95%B6%E5%8B%9E%E5%8F%88%E5%87%BA%E6%96%B0%E5%98%A2%E5%95%A6%E8%81%BD%E6%97%A5%E9%96%8B%E5%A7%8B%E6%9C%89%E5%BE%97%E9%A3%9F%E5%A4%A7%E5%AE%B6%E6%9C%80%E6%83%B3%E8%A9%A6%E9%82%8A%E6%AC%BE", "sentiment": "neutral", "sentiment_score": 0.0, "sentiment_reason": null, "published_at": "2026-03-23T15:07:42.227185", "collected_at": "2026-03-23T15:08:06.682133", "analyzed_at": null, "raw_data": "{\"score\": 0.63179934, \"query\": \"麥當勞 最新\"}"}, {"id": 1999, "title": "麦当劳开启2026年派Day欢庆，苹果香蕉双拼派限时上新 - 新浪山东", "content": "## 新浪山东 资讯\n\n  \n\n### 确定不再关注此人吗\n\n麦当劳中国宣布正式开启第十二届“派Day”。 即日起至2026年3月15日，麦当劳派Day以“心想派成，吃派就对”为主题，倾听粉丝呼声，在超值吃派传统之外，更以全新“双拼迷你派”形式，让苹果派与香蕉派惊喜返场，实现一次品尝两款人气口味的愿望。派Day期间，顾客可以最低3.14元的价格选购经典香芋派、菠萝派等多款派产品。与此同时，为打造更具仪式感的节日体验，麦当劳在社交媒体上收集了粉丝对派产品的真挚反馈与热爱，并将真实“吃派心声”融入产品包装并覆盖多个城市的户外广告中，通过多种形式共同庆祝这一与粉丝双向奔赴的年度品牌节日。\n\n  ) \n\n麦当劳派Day首次上新苹果香蕉双拼迷你派，一盒享用两款经典口味\n\n倾听粉丝呼声，人气口味创新形式返场回应热爱\n\n派是麦当劳口味最丰富的产品之一。每年的3月14日是世界圆周率日，因“派”与“π”谐音，麦当劳中国便将每年3月14日设为“派Day”，邀请粉丝一起来吃派庆祝。自2015年起，派Day已逐渐发展为粉丝心中独具仪式感的品牌节日，在社交媒体上，分享麦当劳派的口味、交流吃派体验已成为粉丝们的日常。以人气产品苹果派为例，自2024年8月限时售卖后至今，顾客在社交媒体持续分享近万条呼唤其再次回归的相关内容。今年派Day，麦当劳以“心想派成，吃派就对”为主题，不仅让呼声最高的苹果派与香蕉派同期回归，更以双拼迷你派的创新形式联袂亮相，一款产品即可享用两款人气美味。\n\n粉丝心声印上派盒，户外广告“喊话”回归\n\n为回应粉丝长久以来对麦当劳派产品的支持与热爱，品牌精选粉丝在社交平台分享的真实内容——有对怀念口味的深情呼唤，也有关于派的不同吃法与口味阵营的有趣讨论——并将这些心声融入全新包装设计。一份份真实的喜爱，由此被印在派盒之上，成为可以触碰的“粉丝时刻”。 [...] 这份热爱也延续至线下。活动期间，上海地铁2号线静安寺站站台被派Day主题装点一新——粉丝在社交媒体上发布的文案跃上广告灯箱，让那些真挚的期待被更多人看见。品牌亦借此回应：“心心念念的派回来了，来麦当劳一起庆祝。”与此同时，全国超过50座城市同步上线指路形式的户外广告，迎接广大粉丝前往就近的麦当劳餐厅，品尝记忆中的味道，与热爱再度相逢。\n\n  ) \n\n上海静安寺2号线派Day主题站台，喊话粉丝苹果、香蕉派回归\n\n经典常驻与人气返场，多款人气口味共庆派Day\n\n2026年3月9日至3月15日，顾客可通过到店取餐及麦乐送购买指定派产品。经典产品香芋派与菠萝派以3.14元的“派Day记忆价”超值回归，全新“苹果香蕉双拼迷你派”则以5.92元的超值价格加入节日促销阵容——3.14与5.92，巧妙呼应了国际圆周率日的3.141592……数字巧思。全新的苹果迷你派采用法式千层酥皮，内馅融入清新苹果粒与淡淡肉桂香气；香蕉迷你派呈现香蕉浓郁醇厚的香甜风味。通过双拼迷你派的创新形式，一次品尝两款回归的人气口味，开启一场诚意满满的吃派狂欢。\n\n分享文章到:   \"分享到微博\")\n\n;)\n\n## 相关新闻\n\n## 推荐阅读\n\n加载中...", "summary": null, "source":             // 處理查詢參數 URL (網頁上的網址可能因參數順序不同而無法完全匹配字串，這裡做簡單匹配)
            if (window.GITHUB_PAGES_DATA[url]) {
                return {
                    ok: true,
                    json: async () => window.GITHUB_PAGES_DATA[url]
                };
            }
            
            // 處理 articles 網址重組比對
            if (url.includes('/api/articles?')) {
                // 若找不到對應快照，回傳空結果避免網頁報錯
                return {
                    ok: true,
                    json: async () => ({ articles: [], page: 1, total_pages: 1 })
                };
            }
            
            if (url.includes('/api/run-status')) {
                return { ok: true, json: async () => ({ is_running: false }) };
            }
            
            if (url.includes('/api/run-now')) {
                return { ok: true, json: async () => ({ status: "error", message: "靜態備份頁面不支援執行即時分析。" }) };
            }

            return originalFetch(resource, options);
        };
    </script>
    
</head>
