<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="麥當勞品牌輿情監控系統 - 即時追蹤品牌聲譽與網路輿論">
    <title>🍔 麥當勞輿情監控系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@300;400;500;600;700&family=Playfair+Display+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 頂部導航 -->
    <header class="header" id="main-header">
        <div class="header-inner">
            <div class="logo">
                <div class="mccoin logo-mccoin">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Fries sticks -->
                        <rect x="6" y="4" width="2" height="10" fill="#FFC72C" rx="0.5"/>
                        <rect x="9" y="2" width="2" height="12" fill="#FFC72C" rx="0.5"/>
                        <rect x="12" y="3" width="2" height="11" fill="#FFC72C" rx="0.5"/>
                        <rect x="15" y="5" width="2" height="9" fill="#FFC72C" rx="0.5"/>
                        <!-- Red Box -->
                        <path d="M5 13L7 22H17L19 13H5Z" fill="#DA291C"/>
                        <path d="M5 13C5 13 9 15 12 15C15 15 19 13 19 13" fill="#A81D14"/>
                        <!-- Golden Arches (M) -->
                        <path d="M9.5 17.5C9.5 16.5 10.5 16 11 17L12 18L13 17C13.5 16 14.5 16.5 14.5 17.5V20" stroke="#FFC72C" stroke-width="1.2" stroke-linecap="round" fill="none"/>
                    </svg>
                </div>
                <div>
                    <h1>麥當勞輿情監控</h1>
                    <span class="logo-subtitle">Brand Sentiment Monitor</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="status-indicator" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">系統運行中</span>
                </div>
            </div>
        </div>
    </header>
    
    <!-- 背景裝飾物 -->
    <div class="decor-element" style="top: 15%; left: 5%; font-size: 24px;">🍔</div>
    <div class="decor-element" style="top: 25%; right: 8%; font-size: 20px;">🍟</div>
    <div class="decor-element" style="top: 60%; left: 3%; font-size: 30px;">🥤</div>
    <div class="mccoin decor-element" style="top: 40%; right: 4%; transform: scale(0.8);">M</div>
    <div class="mccoin decor-element" style="top: 75%; left: 10%; transform: scale(1.2);">M</div>
    <div class="mccoin decor-element" style="top: 20%; left: 50%; transform: scale(0.7);">M</div>

    <main class="main-content">
        <!-- 統計卡片 -->
        <section class="stats-section" id="stats-section">
            <div class="stats-grid">
                <div class="stat-card stat-total" id="stat-total">
                    <div class="stat-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-total-value">—</span>
                        <span class="stat-label">總文章數</span>
                    </div>
                    <div class="stat-bg-pattern"></div>
                </div>
                <div class="stat-card stat-positive" id="stat-positive">
                    <div class="stat-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-positive-value">—</span>
                        <span class="stat-label">正面評價</span>
                    </div>
                    <div class="stat-ring">
                        <svg viewBox="0 0 36 36">
                            <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="ring-fill ring-positive" id="ring-positive" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                    </div>
                </div>
                <div class="stat-card stat-negative" id="stat-negative">
                    <div class="stat-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-negative-value">—</span>
                        <span class="stat-label">負面評價</span>
                    </div>
                    <div class="stat-ring">
                        <svg viewBox="0 0 36 36">
                            <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="ring-fill ring-negative" id="ring-negative" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                    </div>
                </div>
                <div class="stat-card stat-neutral" id="stat-neutral">
                    <div class="stat-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-neutral-value">—</span>
                        <span class="stat-label">中立評價</span>
                    </div>
                    <div class="stat-ring">
                        <svg viewBox="0 0 36 36">
                            <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="ring-fill ring-neutral" id="ring-neutral" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                    </div>
                </div>
            </div>
        </section>

        <!-- AI 智能摘要看板 -->
        <section class="ai-insight-panel">
            <div class="insight-grid">
                <div class="insight-card insight-positive">
                    <div class="insight-header">
                        <span class="insight-tag">😊 正面亮點</span>
                    </div>
                    <p id="summary-positive">載入中...</p>
                </div>
                <div class="insight-card insight-negative">
                    <div class="insight-header">
                        <span class="insight-tag">😟 負面痛點</span>
                    </div>
                    <p id="summary-negative">載入中...</p>
                </div>
                <div class="insight-card insight-neutral">
                    <div class="insight-header">
                        <span class="insight-tag">😐 綜合觀察</span>
                    </div>
                    <p id="summary-neutral">載入中...</p>
                </div>
            </div>
        </section>

        <!-- 圖表區域 -->
        <section class="charts-section" id="charts-section">
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <h2>情感趨勢</h2>
                        <div class="chart-controls">
                            <button class="chip active" onclick="updateChartDays(7, this)" id="chart-7d">7 天</button>
                            <button class="chip" onclick="updateChartDays(14, this)" id="chart-14d">14 天</button>
                            <button class="chip" onclick="updateChartDays(30, this)" id="chart-30d">30 天</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="trend-chart"></canvas>
                    </div>
                </div>
                <div class="chart-card chart-pie-card">
                    <div class="chart-header">
                        <h2>來源分佈</h2>
                    </div>
                    <div class="chart-container chart-pie-container">
                        <canvas id="source-pie-chart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 篩選與文章列表 -->
        <section class="articles-section" id="articles-section">
            <div class="section-header">
                <h2>📰 最新文章</h2>
                <div class="filters" id="filters">
                    <select id="filter-sentiment" onchange="loadArticles()">
                        <option value="all">所有情感</option>
                        <option value="positive">😊 正面</option>
                        <option value="negative">😟 負面</option>
                        <option value="neutral">😐 中立</option>
                    </select>
                    <select id="filter-source" onchange="loadArticles()">
                        <option value="all">所有來源</option>
                        <option value="Google News">Google News</option>
                        <option value="PTT">PTT</option>
                        <option value="Dcard">Dcard</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Google Reviews">Google 評論</option>
                        <option value="Tavily Search">Tavily Search</option>
                        <option value="DuckDuckGo Search">DuckDuckGo Search</option>
                    </select>
                    <select id="filter-days" onchange="loadArticles()">
                        <option value="7">近 7 天</option>
                        <option value="14">近 14 天</option>
                        <option value="30">近 30 天</option>
                    </select>
                </div>
            </div>

            <div class="articles-list" id="articles-list">
                <div class="loading-placeholder">
                    <div class="spinner"></div>
                    <p>載入中...</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </section>

        <!-- 執行記錄 -->
        <section class="logs-section" id="logs-section">
            <div class="section-header">
                <h2>📋 執行記錄</h2>
                <button class="btn btn-secondary" onclick="loadLogs()">重新整理</button>
            </div>
            <div class="logs-table-wrapper" id="logs-table-wrapper">
                <table class="logs-table" id="logs-table">
                    <thead>
                        <tr>
                            <th>執行時間</th>
                            <th>搜集</th>
                            <th>分析</th>
                            <th>正面</th>
                            <th>負面</th>
                            <th>中立</th>
                            <th>通知</th>
                            <th>狀態</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <tr><td colspan="8" class="empty-state">尚無執行記錄</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 頁尾 -->
    <footer class="footer" id="footer">
        <p>🍔 麥當勞品牌輿情監控系統 &copy; 2026 | Powered by Flask + LLM</p>
    </footer>

    <!-- 載入通知 toast -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/main.js"></script>
</body>
</html>
